<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garden Food - Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان حيوية جداً وعصرية ومشرقة */
            --primary: #00a843; /* أخضر ناصع وحيوي جداً */
            --primary-shadow: rgba(0, 168, 67, 0.3);
            --bg-color: #f0f4f8; /* خلفية عصرية ليست بيضاء بالكامل لبروز الكروت */
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --accent: #ff9800; /* برتقالي حيوي للسعر */
            --radius: 24px;
            --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            user-select: none;
            padding-bottom: 120px;
        }

        /* الإشعارات العصرية */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            background: #111827; color: #fff; padding: 14px 28px; border-radius: 50px;
            font-weight: 800; font-size: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, fadeOut 0.4s 2s forwards;
            display: flex; align-items: center; gap: 10px;
        }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-40px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-20px); } }

        /* الهيدر الحديث */
        .header {
            background: var(--card-bg);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            position: sticky; top: 0; z-index: 100;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }
        .brand-area { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 55px; height: 55px; border-radius: 16px;
            object-fit: contain;
            box-shadow: 0 5px 15px var(--primary-shadow);
        }
        .brand-text { display: flex; flex-direction: column; }
        .store-name { font-weight: 900; font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        .store-desc { font-weight: 700; font-size: 0.85rem; color: var(--text-muted); }

        .back-btn {
            background: var(--bg-color); color: var(--text-dark);
            border: none; padding: 10px 20px; border-radius: 50px;
            font-family: 'Tajawal'; font-weight: 800; font-size: 1rem;
            cursor: pointer; display: none; transition: var(--transition);
        }
        .back-btn:active { transform: scale(0.9); background: var(--text-dark); color: #fff; }

        /* شبكة المربعات الثنائية (Kiosk Grid) */
        .kiosk-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            animation: fadeIn 0.4s ease-out;
            will-change: transform, opacity;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ستايل المربعات (للقسم والصنف) */
        .square-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex; flex-direction: column;
            overflow: hidden; cursor: pointer;
            transition: var(--transition);
            transform: translateZ(0);
            border: 2px solid transparent;
        }
        .square-card:active {
            transform: scale(0.94);
            border-color: var(--primary);
            box-shadow: 0 10px 25px var(--primary-shadow);
        }

        /* مربعات الأقسام (صورة كاملة تقريباً) */
        .cat-img {
            width: 100%; aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        .cat-title {
            padding: 15px 10px; text-align: center;
            font-weight: 900; font-size: 1.2rem; color: var(--text-dark);
        }

        /* مربعات الأصناف */
        .item-card { position: relative; padding-bottom: 10px; }
        .item-img {
            width: 100%; aspect-ratio: 1 / 0.8;
            object-fit: cover; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        .item-info { padding: 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .item-title { font-weight: 900; font-size: 1.1rem; color: var(--text-dark); line-height: 1.2; margin-bottom: 5px; }
        .item-price { font-weight: 900; font-size: 1.2rem; color: var(--accent); margin-bottom: 12px; }
        
        .add-btn {
            background: var(--primary); color: #fff;
            border: none; width: 90%; padding: 12px; border-radius: 14px;
            font-family: 'Tajawal'; font-weight: 900; font-size: 1.1rem;
            box-shadow: 0 6px 15px var(--primary-shadow);
            transition: var(--transition);
        }
        .add-btn:active { transform: scale(0.9); }

        /* الزر العائم للسلة */
        .cart-fab {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            background: var(--text-dark); color: #fff;
            padding: 16px 24px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); cursor: pointer;
            transform: translateY(150%); transition: var(--transition); z-index: 999;
        }
        .cart-fab.visible { transform: translateY(0); }
        .cart-fab:active { transform: scale(0.96); }
        .fab-text { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .fab-badge { background: var(--primary); padding: 4px 12px; border-radius: 12px; font-size: 1.1rem; }

        /* نافذة السلة (Bottom Sheet) */
        .cart-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-radius: 35px 35px 0 0;
            padding: 25px 20px; box-shadow: 0 -10px 50px rgba(0,0,0,0.15);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; display: flex; flex-direction: column; gap: 20px;
        }
        .cart-sheet.active { transform: translateY(0); }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-weight: 900; font-size: 1.5rem; color: var(--text-dark); }
        .close-cart { background: var(--bg-color); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        
        .cart-items-container { max-height: 40vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .cart-items-container::-webkit-scrollbar { display: none; }
        
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); padding: 12px 16px; border-radius: 16px;
        }
        .cart-item-info h4 { font-size: 1.1rem; font-weight: 900; color: var(--text-dark); }
        .cart-item-info p { font-size: 1rem; font-weight: 800; color: var(--primary); margin-top: 5px; }
        
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #fff; padding: 6px 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .qty-btn { background: none; border: none; font-size: 1.4rem; font-weight: 900; color: var(--text-dark); cursor: pointer; }
        .qty-num { font-weight: 900; font-size: 1.2rem; color: var(--primary); }

        .checkout-btn {
            background: var(--primary); color: #fff; border: none;
            padding: 20px; border-radius: 20px; font-family: 'Tajawal'; font-weight: 900;
            font-size: 1.3rem; cursor: pointer; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px var(--primary-shadow);
        }
        .checkout-btn:active { transform: scale(0.97); }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 999;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        
        .section-title { width: 100%; grid-column: 1 / -1; font-weight: 900; font-size: 1.4rem; margin-bottom: -5px; color: var(--text-dark); }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- الهيدر -->
    <div class="header">
        <div class="brand-area">
            <img src="" alt="Logo" class="logo" id="siteLogo">
            <div class="brand-text">
                <span class="store-name" id="siteName">تحميل...</span>
                <span class="store-desc">طلب سريع ومباشر ⚡</span>
            </div>
        </div>
        <button class="back-btn" id="backBtn" onclick="renderCategories()">رجوع</button>
    </div>

    <!-- شبكة المربعات (Kiosk Grid) -->
    <div class="kiosk-grid" id="mainContainer"></div>

    <!-- الزر العائم -->
    <div class="cart-fab" id="cartFab" onclick="toggleCart()">
        <div class="fab-text">🛒 السلة <span class="fab-badge" id="fabCount">0</span></div>
        <div class="fab-text" id="fabTotal">0</div>
    </div>

    <!-- نافذة السلة -->
    <div class="cart-sheet" id="cartSheet">
        <div class="cart-header">
            <h3>طلباتك 🍔</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <button class="checkout-btn" onclick="sendWhatsApp()">
            <span>إرسال للواتساب 💬</span>
            <span id="sheetTotal">0</span>
        </button>
    </div>

    <script>
        let appSettings = {};
        let menuData = [];
        let cart = [];

        // دالة قوية لحل مشكلة اللوغو والصور المكسورة بشكل نهائي
        function fixUrl(url) {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            // إزالة أي شرطات مائلة في البداية لضمان قراءة الصورة من المجلد الحالي مباشرة
            return './' + url.replace(/^\/+/, '');
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✨ ${message}`;
            container.appendChild(toast);
            if(navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => toast.remove(), 2500);
        }

        async function initApp() {
            try {
                const setRes = await fetch('./settings.json?v=' + Date.now());
                appSettings = await setRes.json();
                
                // تطبيق رابط اللوغو، مع وضع الصورة الأساسية كبديل في حال فشل الرابط
                const logoImg = document.getElementById('siteLogo');
                logoImg.src = fixUrl(appSettings.logo || 'PhotoRoom-20260715_012445.jpg');
                logoImg.onerror = function() { this.src = './PhotoRoom-20260715_012445.jpg'; };
                
                document.getElementById('siteName').innerText = appSettings.store_name || 'Garden Food';

                const menuRes = await fetch('./menu.json?v=' + Date.now());
                const mData = await menuRes.json();
                menuData = mData.categories || [];
                
                renderCategories();
            } catch (e) {
                console.error("خطأ", e);
                document.getElementById('mainContainer').innerHTML = '<h3 style="grid-column: 1/-1; text-align:center;">حدث خطأ في تحميل البيانات</h3>';
            }
        }

        // عرض الأقسام بشكل مربعات كبيرة
        function renderCategories() {
            const container = document.getElementById('mainContainer');
            document.getElementById('backBtn').style.display = 'none';
            container.innerHTML = '<div class="section-title">ماذا تود أن تطلب؟ 😋</div>';
            
            menuData.forEach((cat) => {
                container.innerHTML += `
                    <div class="square-card" onclick="renderItems('${cat.id}')">
                        <img src="${fixUrl(cat.image)}" alt="${cat.name}" class="cat-img" loading="lazy">
                        <div class="cat-title">${cat.name}</div>
                    </div>
                `;
            });
        }

        // عرض الأصناف داخل القسم المحدد كمربعات
        function renderItems(categoryId) {
            const category = menuData.find(c => c.id === categoryId);
            if(!category) return;

            const container = document.getElementById('mainContainer');
            document.getElementById('backBtn').style.display = 'block';
            
            // إعادة تشغيل حركة الدخول السلسة
            container.style.animation = 'none';
            container.offsetHeight; 
            container.style.animation = 'fadeIn 0.3s ease-out';
            
            container.innerHTML = `<div class="section-title">${category.name}</div>`;

            category.items.forEach((item) => {
                container.innerHTML += `
                    <div class="square-card item-card">
                        <img src="${fixUrl(item.image)}" alt="${item.name}" class="item-img" loading="lazy">
                        <div class="item-info">
                            <div class="item-title">${item.name}</div>
                            <div class="item-price">${item.price} ${appSettings.currency || ''}</div>
                            <button class="add-btn" onclick="addToCart(event, '${item.id}', '${item.name}', ${item.price})">إضافة +</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(event, id, name, price) {
            event.stopPropagation(); // منع انتقال الضغطة للكرت الأب
            const existing = cart.find(i => i.id === id);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price: parseFloat(price), qty: 1 });
            }
            showToast(`تمت إضافة ${name}`);
            updateCartUI();
        }

        function updateItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index > -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) cart.splice(index, 1);
                updateCartUI();
            }
        }

        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            if(cart.length === 0) {
                fab.classList.remove('visible');
                if(document.getElementById('cartSheet').classList.contains('active')) toggleCart();
                return;
            }
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            let totalStr = `${total} ${appSettings.currency || ''}`;
            
            document.getElementById('fabCount').innerText = count;
            document.getElementById('fabTotal').innerText = totalStr;
            document.getElementById('sheetTotal').innerText = totalStr;
            
            fab.classList.add('visible');
            
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            cart.forEach(item => {
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price * item.qty} ${appSettings.currency || ''}</p>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', 1)">+</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', -1)">−</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCart() {
            const sheet = document.getElementById('cartSheet');
            const overlay = document.getElementById('overlay');
            sheet.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function sendWhatsApp() {
            if(cart.length === 0) return;
            
            let message = (appSettings.whatsapp_template || "مرحباً، أود طلب التالي:") + "\n\n";
            let total = 0;
            
            cart.forEach(item => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                message += `▪️ ${item.qty}x ${item.name} - ${itemTotal} ${appSettings.currency || ''}\n`;
            });
            
            message += `\n*الإجمالي: ${total} ${appSettings.currency || ''}*`;
            
            let cleanNumber = (appSettings.whatsapp_number || '').replace(/\D/g, '');
            window.location.href = `https://wa.me/${cleanNumber}?text=${encodeURIComponent(message)}`;
            
            cart = [];
            updateCartUI();
            toggleCart();
        }

        initApp();
    </script>
</body>
</html>
