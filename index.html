<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garden Food Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a8f34; /* أخضر عصري ومشرق */
            --primary-light: #e8f5e9; /* خلفية خضراء هادئة جداً */
            --bg-color: #f8f9fc; /* رمادي فاتح مائل للأزرق النظيف */
            --card-bg: #ffffff; /* كروت بيضاء ناصعة */
            --text-dark: #1e293b; /* كحلي غامق للنصوص (أفخم من الأسود) */
            --text-muted: #64748b;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.03);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            user-select: none;
            padding-bottom: 120px; /* مساحة للسلة */
        }

        /* الإشعارات (Toasts) */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 50px;
            font-weight: 700; font-size: 0.95rem; box-shadow: var(--shadow-md);
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, fadeOut 0.4s 2s forwards;
        }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-30px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-20px); } }

        /* الهيدر العلوي الأبيض */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
        }
        .logo {
            width: 55px; height: 55px; border-radius: 12px;
            object-fit: contain; background: #fff;
            box-shadow: 0 4px 10px rgba(26, 143, 52, 0.15);
        }
        .header-text { display: flex; flex-direction: column; }
        .store-name { font-weight: 900; font-size: 1.4rem; color: var(--text-dark); line-height: 1.2; }
        .store-desc { font-size: 0.85rem; color: var(--primary); font-weight: 700; }

        /* شريط الأقسام الأفقي (Modern Tabs) */
        .categories-wrapper {
            background: #fff;
            padding: 15px 20px;
            position: sticky;
            top: 85px; /* تحت الهيدر */
            z-index: 99;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02);
        }
        .categories-scroll {
            display: flex; gap: 10px; overflow-x: auto; scroll-behavior: smooth;
            padding-bottom: 5px;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-tab {
            padding: 10px 20px; background: var(--bg-color); border-radius: 50px;
            font-weight: 800; font-size: 1rem; color: var(--text-muted);
            white-space: nowrap; cursor: pointer; transition: var(--transition);
            border: 2px solid transparent;
        }
        .cat-tab.active {
            background: var(--primary-light); color: var(--primary);
            border-color: rgba(26, 143, 52, 0.2);
            transform: scale(1.05);
        }

        /* شبكة الأصناف */
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 20px;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            background: var(--card-bg); border-radius: var(--radius-md);
            padding: 12px; box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; gap: 10px;
            transition: var(--transition);
        }
        .item-card:active { transform: scale(0.96); box-shadow: none; }
        .item-img {
            width: 100%; height: 130px; object-fit: cover;
            border-radius: 12px; background: var(--bg-color);
        }
        .item-info { display: flex; flex-direction: column; flex-grow: 1; }
        .item-title { font-weight: 800; font-size: 1.1rem; color: var(--text-dark); margin-bottom: 4px; line-height: 1.3; }
        .item-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 10px; flex-grow: 1; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .item-price { font-weight: 900; font-size: 1.1rem; color: var(--primary); }
        .add-btn {
            background: var(--primary); color: #fff; width: 36px; height: 36px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; border: none; cursor: pointer; transition: var(--transition);
            box-shadow: 0 4px 10px rgba(26, 143, 52, 0.3);
        }
        .add-btn:active { transform: scale(0.85); }

        /* السلة العائمة (Bottom Sheet Style) */
        .cart-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-radius: 30px 30px 0 0;
            padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; display: flex; flex-direction: column; gap: 15px;
        }
        .cart-sheet.active { transform: translateY(0); }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-weight: 900; font-size: 1.3rem; color: var(--text-dark); }
        
        /* عناصر السلة */
        .cart-items-container { max-height: 35vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); padding: 10px 15px; border-radius: 12px;
        }
        .cart-item-info h4 { font-size: 1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
        .cart-item-info p { font-size: 0.9rem; font-weight: 700; color: var(--primary); }
        
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #fff; padding: 4px 8px; border-radius: 8px; box-shadow: var(--shadow-sm); }
        .qty-btn { background: none; border: none; font-size: 1.2rem; font-weight: 900; color: var(--text-dark); cursor: pointer; padding: 0 5px; }
        .qty-num { font-weight: 800; font-size: 1.1rem; }

        .checkout-btn {
            background: var(--primary); color: #fff; border: none;
            padding: 18px; border-radius: 16px; font-family: 'Tajawal'; font-weight: 900;
            font-size: 1.2rem; cursor: pointer; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 20px rgba(26, 143, 52, 0.3);
        }
        .checkout-btn:active { transform: scale(0.97); }

        /* زر فتح السلة المصغر الدائم */
        .cart-fab {
            position: fixed; bottom: 25px; right: 25px; left: 25px;
            background: var(--text-dark); color: #fff; padding: 15px 25px;
            border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(30, 41, 59, 0.3); cursor: pointer;
            transform: translateY(150%); transition: var(--transition); z-index: 999;
        }
        .cart-fab.visible { transform: translateY(0); }
        .cart-fab:active { transform: scale(0.95); }
        .fab-text { font-weight: 800; font-size: 1.1rem; display: flex; gap: 10px; align-items: center; }
        .fab-badge { background: var(--primary); padding: 2px 10px; border-radius: 10px; font-size: 1rem; }

        /* Overlay لإغلاق السلة */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- الهيدر -->
    <div class="header">
        <img src="" alt="Logo" class="logo" id="siteLogo">
        <div class="header-text">
            <span class="store-name" id="siteName">جاري التحميل...</span>
            <span class="store-desc">طلب سريع ومباشر ✨</span>
        </div>
    </div>

    <!-- الأقسام (Modern Swipeable Tabs) -->
    <div class="categories-wrapper">
        <div class="categories-scroll" id="categoriesBar">
            <!-- سيتم حقن الأقسام هنا -->
        </div>
    </div>

    <!-- شبكة الأصناف -->
    <div class="items-grid" id="mainContainer">
        <h3 style="text-align:center; width:100%; color:var(--text-muted); margin-top:20px;">جاري تحميل القائمة...</h3>
    </div>

    <!-- الزر العائم لفتح السلة -->
    <div class="cart-fab" id="cartFab" onclick="toggleCart()">
        <div class="fab-text">السلة <span class="fab-badge" id="fabCount">0</span></div>
        <div class="fab-text" id="fabTotal">0</div>
    </div>

    <!-- السلة (Bottom Sheet) -->
    <div class="cart-sheet" id="cartSheet">
        <div class="cart-header">
            <h3>سلة المشتريات 🛒</h3>
            <span style="font-size: 1.5rem; cursor: pointer; color: var(--text-muted);" onclick="toggleCart()">✕</span>
        </div>
        <div class="cart-items-container" id="cartItemsList">
            <!-- عناصر السلة -->
        </div>
        <button class="checkout-btn" onclick="sendWhatsApp()">
            <span>إتمام الطلب عبر واتساب</span>
            <span id="sheetTotal">0</span>
        </button>
    </div>

    <script>
        let appSettings = {};
        let menuData = [];
        let cart = [];
        let currentCategoryId = null;

        function fixUrl(url) {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            return url.startsWith('/') ? '.' + url : url;
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✨ ${message}`;
            container.appendChild(toast);
            if(navigator.vibrate) navigator.vibrate(40);
            setTimeout(() => toast.remove(), 2500);
        }

        async function initApp() {
            try {
                const setRes = await fetch('./settings.json?v=' + Date.now());
                appSettings = await setRes.json();
                
                document.getElementById('siteLogo').src = fixUrl(appSettings.logo);
                document.getElementById('siteName').innerText = appSettings.store_name || 'Garden Food';

                const menuRes = await fetch('./menu.json?v=' + Date.now());
                const mData = await menuRes.json();
                menuData = mData.categories || [];
                
                if(menuData.length > 0) {
                    renderCategoryTabs();
                    selectCategory(menuData[0].id); // اختيار أول قسم تلقائياً
                }
            } catch (e) {
                console.error("خطأ", e);
                document.getElementById('mainContainer').innerHTML = '<h3 style="text-align:center; width:100%;">خطأ في التحميل</h3>';
            }
        }

        // رسم شريط الأقسام العلوي
        function renderCategoryTabs() {
            const bar = document.getElementById('categoriesBar');
            bar.innerHTML = '';
            menuData.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'cat-tab';
                div.id = `tab-${cat.id}`;
                div.innerText = cat.name;
                div.onclick = () => selectCategory(cat.id);
                bar.appendChild(div);
            });
        }

        // اختيار القسم وعرض أصنافه
        function selectCategory(id) {
            currentCategoryId = id;
            
            // تحديث الشكل النشط للتبويبات
            document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${id}`);
            if(activeTab) {
                activeTab.classList.add('active');
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const category = menuData.find(c => c.id === id);
            const container = document.getElementById('mainContainer');
            
            // خدعة صغيرة لإعادة تشغيل الأنيميشن
            container.style.animation = 'none';
            container.offsetHeight; // trigger reflow
            container.style.animation = null;
            container.innerHTML = '';

            if(!category || !category.items) return;

            category.items.forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <img src="${fixUrl(item.image)}" alt="${item.name}" class="item-img" loading="lazy">
                        <div class="item-info">
                            <div class="item-title">${item.name}</div>
                            <div class="item-desc">${item.description || ''}</div>
                            <div class="price-row">
                                <div class="item-price">${item.price} ${appSettings.currency || ''}</div>
                                <button class="add-btn" onclick="addToCart('${item.id}', '${item.name}', ${item.price})">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price: parseFloat(price), qty: 1 });
            }
            showToast(`تمت إضافة ${name}`);
            updateCartUI();
        }

        function updateItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index > -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) {
                    cart.splice(index, 1);
                }
                updateCartUI();
            }
        }

        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            
            if(cart.length === 0) {
                fab.classList.remove('visible');
                if(document.getElementById('cartSheet').classList.contains('active')) toggleCart();
                return;
            }
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            
            let totalStr = `${total} ${appSettings.currency || ''}`;
            document.getElementById('fabCount').innerText = count;
            document.getElementById('fabTotal').innerText = totalStr;
            document.getElementById('sheetTotal').innerText = totalStr;
            
            fab.classList.add('visible');
            
            // تحديث قائمة السلة الداخلية
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            cart.forEach(item => {
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price * item.qty} ${appSettings.currency || ''}</p>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', 1)">+</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', -1)">-</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCart() {
            const sheet = document.getElementById('cartSheet');
            const overlay = document.getElementById('overlay');
            sheet.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function sendWhatsApp() {
            if(cart.length === 0) return;
            
            let message = (appSettings.whatsapp_template || "مرحباً، أود طلب التالي:") + "\n\n";
            let total = 0;
            
            cart.forEach(item => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                message += `🛍️ ${item.qty}x ${item.name} - ${itemTotal} ${appSettings.currency || ''}\n`;
            });
            
            message += `\n*🧾 الإجمالي المطلوب: ${total} ${appSettings.currency || ''}*`;
            
            let cleanNumber = (appSettings.whatsapp_number || '').replace(/\D/g, '');
            window.location.href = `https://wa.me/${cleanNumber}?text=${encodeURIComponent(message)}`;
            
            cart = [];
            updateCartUI();
            toggleCart();
        }

        initApp();
    </script>
</body>
</html>
