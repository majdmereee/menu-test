<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garden Food Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* مزيج الأبيض والأخضر الاحترافي */
            --primary: #0ca143; /* أخضر الحديقة المنعش */
            --primary-light: #e6f9ed; /* خلفية خضراء هادئة جداً */
            --primary-shadow: rgba(12, 161, 67, 0.2);
            --bg-color: #f7fbf8; /* أبيض مكسور بخضار خفيف جداً للنقاء */
            --card-bg: #ffffff;
            --text-dark: #0f2918; /* أخضر داكن جداً كلون بديل للأسود القاسي */
            --text-muted: #6b8273;
            --accent: #f59e0b;
            --radius-lg: 32px;
            --radius-md: 20px;
            --transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            user-select: none;
            padding-bottom: 130px;
        }

        /* توست الإشعارات */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            background: var(--primary); color: #fff; padding: 14px 28px; border-radius: 50px;
            font-weight: 800; font-size: 1rem; box-shadow: 0 10px 25px var(--primary-shadow);
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, fadeOut 0.4s 2s forwards;
            display: flex; align-items: center; gap: 10px; border: 2px solid rgba(255,255,255,0.2);
        }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-40px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-20px); } }

        /* الهيدر الأبيض النقي */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(12, 161, 67, 0.05);
            position: sticky; top: 0; z-index: 100;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        .brand-area { display: flex; align-items: center; gap: 15px; }
        .logo { width: 60px; height: 60px; border-radius: 18px; object-fit: contain; }
        .brand-text { display: flex; flex-direction: column; }
        .store-name { font-weight: 900; font-size: 1.5rem; color: var(--text-dark); letter-spacing: -0.5px; }
        .store-desc { font-weight: 700; font-size: 0.9rem; color: var(--primary); }

        .back-btn {
            background: var(--primary-light); color: var(--primary);
            border: none; padding: 10px 20px; border-radius: 50px;
            font-family: 'Tajawal'; font-weight: 800; font-size: 1rem;
            cursor: pointer; display: none; transition: var(--transition);
        }
        .back-btn:active { transform: scale(0.9); background: var(--primary); color: #fff; }

        /* شبكة الكروت (2x2 Kiosk) */
        .kiosk-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 20px;
            will-change: transform, opacity;
        }

        .section-title {
            grid-column: 1 / -1; font-weight: 900; font-size: 1.5rem;
            color: var(--text-dark); padding: 10px 0; margin-bottom: -5px;
        }

        /* كروت الأقسام والأصناف (Soft UI) */
        .card-square {
            background: var(--card-bg); border-radius: var(--radius-lg);
            box-shadow: 0 12px 35px rgba(12, 161, 67, 0.06);
            display: flex; flex-direction: column; overflow: hidden;
            cursor: pointer; transition: var(--transition);
            transform: translateZ(0); border: 1px solid rgba(12, 161, 67, 0.05);
        }
        .card-square:active { transform: scale(0.94); box-shadow: 0 5px 15px var(--primary-shadow); border-color: var(--primary); }

        /* الأقسام */
        .cat-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .cat-title { padding: 16px 10px; text-align: center; font-weight: 900; font-size: 1.25rem; color: var(--text-dark); }

        /* الأصناف */
        .item-card { padding-bottom: 12px; }
        .item-img { width: 100%; aspect-ratio: 1 / 0.85; object-fit: cover; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
        .item-info { padding: 12px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .item-title { font-weight: 900; font-size: 1.15rem; color: var(--text-dark); line-height: 1.3; margin-bottom: 5px; }
        .item-price { font-weight: 900; font-size: 1.25rem; color: var(--primary); margin-bottom: 12px; background: var(--primary-light); padding: 4px 12px; border-radius: 50px; }
        
        .add-btn {
            background: var(--primary); color: #fff; border: none;
            width: 100%; padding: 12px; border-radius: 16px;
            font-family: 'Tajawal'; font-weight: 900; font-size: 1.1rem;
            box-shadow: 0 8px 20px var(--primary-shadow); transition: var(--transition);
        }
        .add-btn:active { transform: scale(0.9); }

        /* السلة العائمة */
        .cart-fab {
            position: fixed; bottom: 25px; right: 25px; left: 25px;
            background: var(--text-dark); color: #fff;
            padding: 18px 25px; border-radius: 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(15, 41, 24, 0.3); cursor: pointer;
            transform: translateY(150%); transition: var(--transition); z-index: 999;
        }
        .cart-fab.visible { transform: translateY(0); }
        .cart-fab:active { transform: scale(0.96); }
        .fab-text { font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 12px; }
        .fab-badge { background: var(--primary); color: #fff; padding: 4px 14px; border-radius: 50px; font-size: 1.1rem; }

        /* نافذة السلة */
        .cart-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg); border-radius: 40px 40px 0 0;
            padding: 30px 25px; box-shadow: 0 -15px 50px rgba(12, 161, 67, 0.1);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; display: flex; flex-direction: column; gap: 20px;
        }
        .cart-sheet.active { transform: translateY(0); }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-weight: 900; font-size: 1.6rem; color: var(--text-dark); }
        .close-cart { background: var(--primary-light); color: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        
        .cart-items-container { max-height: 45vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cart-items-container::-webkit-scrollbar { display: none; }
        
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); padding: 15px 18px; border-radius: 20px;
            border: 1px solid rgba(12, 161, 67, 0.05);
        }
        .cart-item-info h4 { font-size: 1.15rem; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        .cart-item-info p { font-size: 1.05rem; font-weight: 800; color: var(--text-muted); }
        
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #fff; padding: 8px 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .qty-btn { background: none; border: none; font-size: 1.5rem; font-weight: 900; color: var(--primary); cursor: pointer; }
        .qty-num { font-weight: 900; font-size: 1.3rem; color: var(--text-dark); }

        .checkout-btn {
            background: var(--primary); color: #fff; border: none;
            padding: 22px; border-radius: 24px; font-family: 'Tajawal'; font-weight: 900;
            font-size: 1.3rem; cursor: pointer; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 30px var(--primary-shadow);
        }
        .checkout-btn:active { transform: scale(0.97); }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 41, 24, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 999;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- الهيدر -->
    <div class="header">
        <div class="brand-area">
            <img src="" alt="Logo" class="logo" id="siteLogo">
            <div class="brand-text">
                <span class="store-name" id="siteName"></span>
                <span class="store-desc" id="siteDesc"></span>
            </div>
        </div>
        <button class="back-btn" id="backBtn" onclick="renderCategories()"></button>
    </div>

    <!-- شبكة المربعات -->
    <div class="kiosk-grid" id="mainContainer"></div>

    <!-- الزر العائم -->
    <div class="cart-fab" id="cartFab" onclick="toggleCart()">
        <div class="fab-text">
            <span id="uiCartWord"></span> 
            <span class="fab-badge" id="fabCount">0</span>
        </div>
        <div class="fab-text" id="fabTotal">0</div>
    </div>

    <!-- نافذة السلة -->
    <div class="cart-sheet" id="cartSheet">
        <div class="cart-header">
            <h3 id="uiCartTitle"></h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <button class="checkout-btn" onclick="sendWhatsApp()">
            <span id="uiCheckoutBtn"></span>
            <span id="sheetTotal">0</span>
        </button>
    </div>

    <script>
        let appSettings = {};
        let menuData = [];
        let cart = [];

        function fixUrl(url) {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            return './' + url.replace(/^\/+/, '');
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✨ ${message}`;
            container.appendChild(toast);
            if(navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => toast.remove(), 2500);
        }

        async function initApp() {
            try {
                const setRes = await fetch('./settings.json?v=' + Date.now());
                appSettings = await setRes.json();
                
                // تطبيق الإعدادات والنصوص الديناميكية
                const logoImg = document.getElementById('siteLogo');
                logoImg.src = fixUrl(appSettings.logo || 'PhotoRoom-20260715_012445.jpg');
                logoImg.onerror = function() { this.src = './PhotoRoom-20260715_012445.jpg'; };
                
                document.getElementById('siteName').innerText = appSettings.store_name || '';
                document.getElementById('siteDesc').innerText = appSettings.store_desc || '';
                document.getElementById('backBtn').innerText = appSettings.ui_back || 'رجوع';
                document.getElementById('uiCartWord').innerText = appSettings.ui_cart_word || 'السلة';
                document.getElementById('uiCartTitle').innerText = appSettings.ui_cart_title || 'الطلبات';
                document.getElementById('uiCheckoutBtn').innerText = appSettings.ui_checkout_btn || 'إتمام الطلب';

                const menuRes = await fetch('./menu.json?v=' + Date.now());
                const mData = await menuRes.json();
                menuData = mData.categories || [];
                
                renderCategories();
            } catch (e) {
                console.error("خطأ", e);
            }
        }

        function renderCategories() {
            const container = document.getElementById('mainContainer');
            document.getElementById('backBtn').style.display = 'none';
            container.innerHTML = `<div class="section-title">${appSettings.ui_greeting || 'ماذا تود أن تطلب؟'}</div>`;
            
            menuData.forEach((cat) => {
                container.innerHTML += `
                    <div class="card-square" onclick="renderItems('${cat.id}')">
                        <img src="${fixUrl(cat.image)}" alt="${cat.name}" class="cat-img" loading="lazy">
                        <div class="cat-title">${cat.name}</div>
                    </div>
                `;
            });
        }

        function renderItems(categoryId) {
            const category = menuData.find(c => c.id === categoryId);
            if(!category) return;

            const container = document.getElementById('mainContainer');
            document.getElementById('backBtn').style.display = 'block';
            
            container.innerHTML = `<div class="section-title">${category.name}</div>`;

            const btnText = appSettings.ui_add_btn || 'إضافة';

            category.items.forEach((item) => {
                container.innerHTML += `
                    <div class="card-square item-card">
                        <img src="${fixUrl(item.image)}" alt="${item.name}" class="item-img" loading="lazy">
                        <div class="item-info">
                            <div class="item-title">${item.name}</div>
                            <div class="item-price">${item.price} ${appSettings.currency || ''}</div>
                            <button class="add-btn" onclick="addToCart(event, '${item.id}', '${item.name}', ${item.price})">${btnText}</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(event, id, name, price) {
            event.stopPropagation();
            const existing = cart.find(i => i.id === id);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price: parseFloat(price), qty: 1 });
            }
            showToast(`تمت إضافة ${name}`);
            updateCartUI();
        }

        function updateItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index > -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) cart.splice(index, 1);
                updateCartUI();
            }
        }

        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            if(cart.length === 0) {
                fab.classList.remove('visible');
                if(document.getElementById('cartSheet').classList.contains('active')) toggleCart();
                return;
            }
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            let totalStr = `${total} ${appSettings.currency || ''}`;
            
            document.getElementById('fabCount').innerText = count;
            document.getElementById('fabTotal').innerText = totalStr;
            document.getElementById('sheetTotal').innerText = totalStr;
            
            fab.classList.add('visible');
            
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            cart.forEach(item => {
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price * item.qty} ${appSettings.currency || ''}</p>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', 1)">+</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="updateItemQty('${item.id}', -1)">−</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCart() {
            const sheet = document.getElementById('cartSheet');
            const overlay = document.getElementById('overlay');
            sheet.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function sendWhatsApp() {
            if(cart.length === 0) return;
            
            let message = (appSettings.whatsapp_template || "مرحباً، أود طلب التالي:") + "\n\n";
            let total = 0;
            
            cart.forEach(item => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                message += `▪️ ${item.qty}x ${item.name} - ${itemTotal} ${appSettings.currency || ''}\n`;
            });
            
            message += `\n*الإجمالي: ${total} ${appSettings.currency || ''}*`;
            
            let cleanNumber = (appSettings.whatsapp_number || '').replace(/\D/g, '');
            window.location.href = `https://wa.me/${cleanNumber}?text=${encodeURIComponent(message)}`;
            
            cart = [];
            updateCartUI();
            toggleCart();
        }

        initApp();
    </script>
</body>
</html>
