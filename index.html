<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم الرقمي 🍔</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { color: #f59e0b; font-size: 32px; }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .menu-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-item h3 { color: #38bdf8; margin-top: 0; }
        .price { color: #10b981; font-weight: bold; font-size: 18px; }
        .admin-btn {
            margin-top: 50px;
            padding: 10px 20px;
            background: #475569;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }
        .admin-btn:hover { background: #3b82f6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>قائمة الطعام اللذيذة 🍕</h1>
        <p>تصفح أطباقنا المميزة والمحدثة مباشرة</p>
    </div>

    <!-- حاوية عرض الأطباق تلقائياً -->
    <div class="menu-container" id="menu-box">
        <p>جاري تحميل المنيو...</p>
    </div>

    <!-- زر للانتقال للوحة التحكم -->
    <a href="/admin/" class="admin-btn">تسجيل دخول الإدارة ⚙️</a>

    <script>
        // كود لجلب أطباق المنيو من ملف الـ JSON وعرضها
        fetch('/menu.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('menu-box');
                container.innerHTML = '';
                data.meals.forEach(meal => {
                    container.innerHTML += `
                        <div class="menu-item">
                            <h3>${meal.title}</h3>
                            <p>${meal.description}</p>
                            <span class="price">${meal.price} $</span>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('menu-box').innerHTML = '<p>قم بإضافة أطباقك من لوحة التحكم أولاً!</p>';
            });
    </script>
</body>
</html>
