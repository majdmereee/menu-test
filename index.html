<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0ca143">
    <title>Garden Food Kiosk - B2B</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات والتنسيقات الأساسية */
        :root { 
            --primary: #0ca143; 
            --primary-dark: #097d33;
            --primary-light: #e6f9ed; 
            --bg-color: #f4f8f5; 
            --card-bg: #ffffff; 
            --text-dark: #0f2918; 
            --text-muted: #6b8273; 
            --danger: #e74c3c;
            --radius-sm: 16px;
            --radius-md: 24px;
            --radius-lg: 32px; 
            --shadow-sm: 0 4px 15px rgba(12, 161, 67, 0.05);
            --shadow-md: 0 12px 35px rgba(12, 161, 67, 0.08);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 140px; overflow-x: hidden; }
        
        /* شاشة التحميل */
        #splash-screen { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* تأثيرات الضغط (Ripple) */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ""; display: block; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; background-image: radial-gradient(circle, #fff 10%, transparent 10.01%); background-repeat: no-repeat; background-position: 50%; transform: scale(10, 10); opacity: 0; transition: transform .5s, opacity 1s; }
        .ripple:active::after { transform: scale(0, 0); opacity: 0.3; transition: 0s; }

        /* إشعارات */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
        .toast { background: rgba(15, 41, 24, 0.95); backdrop-filter: blur(10px); color: #fff; padding: 16px 24px; border-radius: 50px; font-weight: 700; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 10px; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, fadeOut 0.4s 3s forwards; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-40px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-20px); } }

        /* الهيدر والبحث */
        .header-wrapper { position: sticky; top: 0; z-index: 100; }
        .header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
        .brand-area { display: flex; align-items: center; gap: 15px; }
        .logo { width: 55px; height: 55px; border-radius: var(--radius-sm); object-fit: contain; background: #fff; box-shadow: var(--shadow-sm); padding: 5px; }
        .store-info { display: flex; flex-direction: column; }
        .store-name { font-weight: 900; font-size: 1.4rem; color: var(--text-dark); line-height: 1.2; }
        .store-desc { font-weight: 700; font-size: 0.85rem; color: var(--primary); }
        .back-btn { background: var(--primary-light); color: var(--primary); border: none; padding: 10px 20px; border-radius: 50px; font-family: 'Tajawal'; font-weight: 800; display: none; cursor: pointer; transition: var(--transition); }
        
        .search-container { padding: 10px 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .search-input { width: 100%; padding: 14px 20px; border-radius: 50px; border: 1px solid rgba(12, 161, 67, 0.2); background: #fff; font-family: 'Tajawal'; font-size: 1rem; color: var(--text-dark); font-weight: 500; transition: var(--transition); box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

        /* الشبكة الثنائية Kiosk */
        .kiosk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { grid-column: 1 / -1; font-weight: 900; font-size: 1.4rem; padding: 10px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; display: block; width: 6px; height: 24px; background: var(--primary); border-radius: 10px; }

        /* الكروت */
        .card-square { background: var(--card-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-md); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; border: 1px solid rgba(12, 161, 67, 0.05); transition: var(--transition); position: relative; }
        .card-square:active { transform: scale(0.96); box-shadow: var(--shadow-sm); }
        
        /* كارت التصنيف */
        .cat-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; transition: transform 0.5s ease; }
        .card-square:hover .cat-img { transform: scale(1.05); }
        .cat-title { padding: 16px 10px; text-align: center; font-weight: 900; font-size: 1.1rem; background: linear-gradient(to top, rgba(255,255,255,1) 80%, rgba(255,255,255,0)); z-index: 2; position: relative; }
        
        /* كارت المنتج */
        .item-card { padding-bottom: 12px; }
        .item-img-container { position: relative; overflow: hidden; aspect-ratio: 1/0.9; background: #f0f0f0; }
        .item-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card-square:hover .item-img { transform: scale(1.08); }
        .item-info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-title { font-weight: 800; font-size: 1rem; margin-bottom: 8px; line-height: 1.3; color: var(--text-dark); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-weight: 900; color: var(--primary); background: var(--primary-light); padding: 6px 14px; border-radius: 50px; display: inline-block; margin: 0 auto 12px auto; font-size: 1.1rem; }
        .view-btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: var(--radius-sm); font-family: 'Tajawal'; font-weight: 800; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* نافذة تفاصيل المنتج (Modal) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1001; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .product-modal { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-color); border-radius: var(--radius-lg) var(--radius-lg) 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 1002; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .product-modal.active { transform: translateY(0); }
        .modal-img-area { position: relative; width: 100%; height: 35vh; background: #fff; }
        .modal-img { width: 100%; height: 100%; object-fit: contain; padding: 20px; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.2rem; font-weight: 900; color: var(--text-dark); cursor: pointer; box-shadow: var(--shadow-sm); z-index: 10; }
        .modal-content { padding: 25px; overflow-y: auto; background: var(--card-bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; margin-top: -30px; position: relative; z-index: 5; flex-grow: 1; }
        .modal-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; color: var(--text-dark); }
        .modal-price { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 20px; display: inline-block; }
        .modal-desc-box { background: var(--bg-color); padding: 15px; border-radius: var(--radius-sm); margin-bottom: 25px; }
        .modal-desc-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; color: var(--text-muted); }
        .modal-desc { font-size: 1rem; line-height: 1.6; font-weight: 500; }
        
        .modal-actions { background: #fff; padding: 20px 25px 30px 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 -10px 20px rgba(0,0,0,0.03); z-index: 10; }
        .qty-selector { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 10px; border-radius: 50px; }
        .qty-selector button { background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; font-weight: 900; color: var(--primary); box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.2s; }
        .qty-selector button:active { transform: scale(0.9); }
        .qty-selector span { font-size: 1.5rem; font-weight: 900; min-width: 40px; text-align: center; }
        .modal-add-btn { background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 50px; font-family: 'Tajawal'; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(12,161,67,0.3); }

        /* السلة العائمة (FAB) */
        .cart-fab { position: fixed; bottom: 25px; right: 25px; left: 25px; background: rgba(15, 41, 24, 0.95); backdrop-filter: blur(10px); color: #fff; padding: 18px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 999; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.1); }
        .cart-fab.visible { transform: translateY(0); }
        .cart-fab:active { transform: scale(0.98); }
        .fab-badge { background: var(--primary); padding: 4px 14px; border-radius: 50px; font-size: 1.1rem; }
        .fab-total { background: rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 50px; }

        /* شيت السلة */
        .cart-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 30px 25px; box-shadow: var(--shadow-lg); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 1000; display: flex; flex-direction: column; gap: 20px; max-height: 85vh; }
        .cart-sheet.active { transform: translateY(0); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--bg-color); }
        .cart-header h3 { font-weight: 900; font-size: 1.6rem; color: var(--text-dark); }
        .close-cart { background: var(--bg-color); color: var(--danger); border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        
        .cart-items-container { overflow-y: auto; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; padding: 5px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 15px 20px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.02); }
        .cart-item-info h4 { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; }
        .cart-item-info div { color: var(--primary); font-weight: 900; }
        .cart-qty-controls { display: flex; gap: 15px; align-items: center; background: #fff; padding: 5px 10px; border-radius: 50px; box-shadow: var(--shadow-sm); }
        .cart-qty-controls button { background: none; border: none; font-size: 1.5rem; font-weight: 900; color: var(--text-dark); padding: 0 5px; cursor: pointer; }
        
        .checkout-btn { background: var(--primary); color: #fff; border: none; padding: 22px; border-radius: 50px; font-family: 'Tajawal'; font-weight: 900; font-size: 1.3rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(12,161,67,0.3); margin-top: 10px; }
        
        .empty-cart-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-weight: 700; font-size: 1.2rem; display: none; }

        /* الشادو الخارجي العام */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 998; }
        .overlay.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="splash-screen">
        <div class="spinner"></div>
        <h2 style="color: white; font-weight: 900; font-size: 1.5rem;">جاري التجهيز...</h2>
    </div>

    <!-- الإشعارات -->
    <div id="toast-container"></div>
    <div class="overlay" id="overlay" onclick="closeAllOverlays()"></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeProductModal()"></div>

    <!-- الهيدر والبحث -->
    <div class="header-wrapper">
        <div class="header">
            <div class="brand-area">
                <img src="" alt="Logo" class="logo" id="siteLogo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3595/3595458.png'">
                <div class="store-info">
                    <span class="store-name" id="siteName">جاردن فود</span>
                    <span class="store-desc" id="siteDesc">لتوريد مستلزمات المطاعم</span>
                </div>
            </div>
            <button class="back-btn ripple" id="backBtn" onclick="renderCategories()">الرئيسية</button>
        </div>
        <div class="search-container" id="searchContainer" style="display: none;">
            <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="filterItems()">
        </div>
    </div>

    <!-- الحاوية الرئيسية (Kiosk Grid) -->
    <div class="kiosk-grid" id="mainContainer"></div>

    <!-- نافذة تفاصيل المنتج (Modal) -->
    <div class="product-modal" id="productModal">
        <button class="close-modal" onclick="closeProductModal()">✕</button>
        <div class="modal-img-area">
            <img src="" class="modal-img" id="modalImg">
        </div>
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-price" id="modalPrice"></div>
            
            <div class="modal-desc-box">
                <div class="modal-desc-title">مواصفات المنتج:</div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
        <div class="modal-actions">
            <div class="qty-selector">
                <button class="ripple" onclick="changeModalQty(1)">+</button>
                <span id="modalQty">1</span>
                <button class="ripple" onclick="changeModalQty(-1)">-</button>
            </div>
            <button class="modal-add-btn ripple" onclick="confirmAddToCart()">
                <span>أضف للسلة</span>
                <span id="modalBtnTotal" style="background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px;">0</span>
            </button>
        </div>
    </div>

    <!-- الزر العائم للسلة -->
    <div class="cart-fab ripple" id="cartFab" onclick="toggleCart()">
        <div style="font-weight:900; font-size:1.3rem; display:flex; gap:10px; align-items:center;">
            <span id="uiCartWord">السلة</span> 
            <span class="fab-badge" id="fabCount">0</span>
        </div>
        <div class="fab-total" style="font-weight:900; font-size:1.3rem;" id="fabTotal">0</div>
    </div>

    <!-- شيت السلة -->
    <div class="cart-sheet" id="cartSheet">
        <div class="cart-header">
            <h3 id="uiCartTitle">سلة الطلبات</h3>
            <button class="close-cart ripple" onclick="toggleCart()">✕</button>
        </div>
        <div class="empty-cart-msg" id="emptyCartMsg">السلة فارغة حالياً</div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <button class="checkout-btn ripple" id="checkoutBtn" onclick="sendWhatsApp()">
            <span id="uiCheckoutBtn">اعتماد وإرسال الطلب</span>
            <span id="sheetTotal" style="background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 50px;">0</span>
        </button>
    </div>

    <script>
        // داتا احتياطية (Mock Data) مخصصة لمستلزمات المطاعم لضمان عمل الكود فوراً
        const fallbackSettings = {
            "store_name": "جاردن فود للإمداد",
            "store_desc": "توريد الجملة للمطاعم والكافيهات",
            "logo": "https://cdn-icons-png.flaticon.com/512/3595/3595458.png",
            "currency": "ر.س",
            "whatsapp_number": "966500000000",
            "whatsapp_template": "مرحباً جاردن فود، أرغب بطلب مستلزمات لمطعمي:",
            "ui_greeting": "تصنيفات المستلزمات",
            "ui_back": "رجوع",
            "ui_cart_word": "السلة",
            "ui_cart_title": "مراجعة الطلب",
            "ui_checkout_btn": "إرسال الطلب"
        };

        const fallbackMenu = [
            {
                "id": "c1", "name": "أكواب ورقية وبلاستيكية", "image": "https://images.unsplash.com/photo-1559418610-d86ce059deec?auto=format&fit=crop&w=500&q=80",
                "items": [
                    { "id": "i1", "name": "كرتون أكواب قهوة دبل وول 8 أونص", "price": 120, "desc": "تحتوي الكرتونة على 1000 كوب ورقي مزدوج الجدار عالي الجودة، يحفظ الحرارة ومناسب للمقاهي والمطاعم.", "image": "https://images.unsplash.com/photo-1512568400610-62da28bc8a13?auto=format&fit=crop&w=500&q=80" },
                    { "id": "i2", "name": "أكواب بلاستيك PET للموهيتو 16 أونص", "price": 145, "desc": "كرتون يحتوي على 1000 كوب شفاف كريستالي مع الأغطية (قبة)، مثالي للعصائر والمشروبات الباردة.", "image": "https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=500&q=80" }
                ]
            },
            {
                "id": "c2", "name": "علب التغليف والوجبات", "image": "https://images.unsplash.com/photo-1606859191214-25806e8e2423?auto=format&fit=crop&w=500&q=80",
                "items": [
                    { "id": "i3", "name": "علب برجر كرافت بنية (شدة 500 حبة)", "price": 95, "desc": "علب برجر صديقة للبيئة من ورق الكرافت المقوى، تحافظ على شكل وحرارة الوجبة وتمنع تسرب الزيوت.", "image": "https://images.unsplash.com/photo-1627042633145-b780d842ba45?auto=format&fit=crop&w=500&q=80" },
                    { "id": "i4", "name": "أكياس ورقية بمقبض (مقاس كبير)", "price": 80, "desc": "ربطة تحتوي على 250 كيس ورقي متين مع مقابض، يتحمل الأوزان الثقيلة ومناسب لطلبات التيك أواي العائلية.", "image": "https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?auto=format&fit=crop&w=500&q=80" }
                ]
            },
            {
                "id": "c3", "name": "الصلصات والمواد الأولية", "image": "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&w=500&q=80",
                "items": [
                    { "id": "i5", "name": "جالون مايونيز هيلمانز 3.7 لتر", "price": 65, "desc": "مايونيز عالي الكثافة والجودة مخصص للمطاعم، يعطي طعماً غنياً للبرجر والساندويشات.", "image": "https://images.unsplash.com/photo-1615486171448-4fd376ddac7b?auto=format&fit=crop&w=500&q=80" },
                    { "id": "i6", "name": "كرتون كاتشب أكياس صغيرة (1000 كيس)", "price": 45, "desc": "أكياس كاتشب 9 جرام لتوزيعها مع الطلبات الخارجية، جودة ممتازة وصلاحية طويلة.", "image": "https://images.unsplash.com/photo-1528750717929-32abb73eb1bc?auto=format&fit=crop&w=500&q=80" }
                ]
            }
        ];

        let appSettings = {}, menuData = [], cart = [];
        let currentCatItems = []; // لتخزين منتجات التصنيف الحالي للبحث
        let currentModalItem = null;
        let currentModalQty = 1;

        function fixUrl(url) { return (!url || url.startsWith('http')) ? url : './' + url.replace(/^\/+/, ''); }
        
        function showToast(msg) { 
            const t = document.createElement('div'); 
            t.className = 'toast'; 
            t.innerHTML = `<span style="font-size:1.5rem">🛒</span> <span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(t); 
            setTimeout(() => t.remove(), 3500);
        }

        async function initApp() {
            try {
                // محاولة جلب الإعدادات من الملف، وإن فشل يستخدم الداتا المدمجة
                const setRes = await fetch('./settings.json?v=' + Date.now()); 
                if(setRes.ok) appSettings = await setRes.json();
                else appSettings = fallbackSettings;
            } catch { appSettings = fallbackSettings; }

            try {
                const menuRes = await fetch('./menu.json?v=' + Date.now()); 
                if(menuRes.ok) { const mData = await menuRes.json(); menuData = mData.categories || []; }
                else menuData = fallbackMenu;
            } catch { menuData = fallbackMenu; }

            // تطبيق الإعدادات
            document.getElementById('siteLogo').src = fixUrl(appSettings.logo);
            document.getElementById('siteName').innerText = appSettings.store_name; 
            document.getElementById('siteDesc').innerText = appSettings.store_desc;
            document.getElementById('backBtn').innerText = appSettings.ui_back; 
            document.getElementById('uiCartWord').innerText = appSettings.ui_cart_word;
            document.getElementById('uiCartTitle').innerText = appSettings.ui_cart_title; 
            document.getElementById('uiCheckoutBtn').innerText = appSettings.ui_checkout_btn;

            // إخفاء شاشة التحميل بعد التجهيز
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 600);
            }, 800);

            renderCategories();
        }

        // عرض التصنيفات
        function renderCategories() {
            document.getElementById('searchContainer').style.display = 'none';
            const c = document.getElementById('mainContainer'); 
            document.getElementById('backBtn').style.display = 'none';
            c.innerHTML = `<div class="section-title">${appSettings.ui_greeting}</div>`;
            
            menuData.forEach(cat => {
                c.innerHTML += `
                <div class="card-square ripple" onclick="renderItems('${cat.id}')">
                    <img src="${fixUrl(cat.image)}" class="cat-img" onerror="this.src='https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=500&q=80'">
                    <div class="cat-title">${cat.name}</div>
                </div>`;
            });
        }

        // عرض منتجات تصنيف معين
        function renderItems(catId) {
            const cat = menuData.find(c => c.id === catId); if(!cat) return;
            currentCatItems = cat.items; // تخزين للبحث
            document.getElementById('searchInput').value = '';
            document.getElementById('searchContainer').style.display = 'block';
            
            const c = document.getElementById('mainContainer'); 
            document.getElementById('backBtn').style.display = 'block';
            
            drawItems(cat.name, currentCatItems);
        }

        // رسم المنتجات (دالة مساعدة لدعم البحث)
        function drawItems(title, items) {
            const c = document.getElementById('mainContainer'); 
            c.innerHTML = `<div class="section-title">${title}</div>`;
            
            if(items.length === 0) {
                c.innerHTML += `<div style="grid-column: 1/-1; text-align:center; padding: 40px 20px; color: var(--text-muted); font-weight:700;">لا توجد منتجات مطابقة.</div>`;
                return;
            }

            items.forEach(item => {
                // تمرير كائن المنتج كـ JSON لسهولة التعامل معه في النافذة
                const itemData = encodeURIComponent(JSON.stringify(item));
                c.innerHTML += `
                <div class="card-square item-card" onclick="openProductModal('${itemData}')">
                    <div class="item-img-container">
                        <img src="${fixUrl(item.image)}" class="item-img" onerror="this.src='https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=500&q=80'">
                    </div>
                    <div class="item-info">
                        <div class="item-title">${item.name}</div>
                        <div class="item-price">${item.price} ${appSettings.currency}</div>
                        <button class="view-btn ripple">الكمية والطلب <span>+</span></button>
                    </div>
                </div>`;
            });
        }

        // البحث (فلترة)
        function filterItems() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = currentCatItems.filter(item => item.name.toLowerCase().includes(q));
            drawItems("نتائج البحث", filtered);
        }

        // منطق نافذة المنتج (Modal)
        function openProductModal(itemDataStr) {
            currentModalItem = JSON.parse(decodeURIComponent(itemDataStr));
            currentModalQty = 1; // تصفير الكمية في النافذة
            
            document.getElementById('modalImg').src = fixUrl(currentModalItem.image);
            document.getElementById('modalTitle').innerText = currentModalItem.name;
            document.getElementById('modalPrice').innerText = `${currentModalItem.price} ${appSettings.currency}`;
            document.getElementById('modalDesc').innerText = currentModalItem.desc || 'لا توجد مواصفات إضافية مسجلة لهذا المنتج.';
            
            updateModalUI();

            document.getElementById('productModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
            currentModalItem = null;
        }

        function changeModalQty(change) {
            currentModalQty += change;
            if(currentModalQty < 1) currentModalQty = 1;
            updateModalUI();
        }

        function updateModalUI() {
            document.getElementById('modalQty').innerText = currentModalQty;
            const total = currentModalItem.price * currentModalQty;
            document.getElementById('modalBtnTotal').innerText = `${total} ${appSettings.currency}`;
        }

        function confirmAddToCart() {
            if(!currentModalItem) return;
            
            let ex = cart.find(i => i.id === currentModalItem.id); 
            if(ex) ex.qty += currentModalQty; 
            else cart.push({...currentModalItem, qty: currentModalQty});
            
            showToast(`تمت إضافة (${currentModalQty}) ${currentModalItem.name}`); 
            updateCartUI();
            closeProductModal();
        }

        // منطق السلة
        function updateItemQty(id, ch) { 
            let i = cart.findIndex(x => x.id === id); 
            if(i > -1) { 
                cart[i].qty += ch; 
                if(cart[i].qty <= 0) cart.splice(i, 1); 
                updateCartUI(); 
            } 
        }
        
        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            const cartList = document.getElementById('cartItemsList');
            const emptyMsg = document.getElementById('emptyCartMsg');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if(!cart.length) { 
                fab.classList.remove('visible'); 
                cartList.innerHTML = '';
                emptyMsg.style.display = 'block';
                checkoutBtn.style.display = 'none';
                return; 
            }
            
            emptyMsg.style.display = 'none';
            checkoutBtn.style.display = 'flex';
            
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            let count = cart.reduce((s, i) => s + i.qty, 0);
            
            document.getElementById('fabCount').innerText = count; 
            document.getElementById('fabTotal').innerText = `${total} ${appSettings.currency}`;
            document.getElementById('sheetTotal').innerText = `${total} ${appSettings.currency}`;
            
            fab.classList.add('visible');
            
            cartList.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${i.name}</h4>
                        <div>${i.price * i.qty} ${appSettings.currency}</div>
                    </div>
                    <div class="cart-qty-controls">
                        <button onclick="updateItemQty('${i.id}',1)">+</button>
                        <span style="font-weight:900; font-size:1.3rem; min-width: 25px; text-align:center;">${i.qty}</span>
                        <button onclick="updateItemQty('${i.id}',-1)" style="color:var(--danger)">-</button>
                    </div>
                </div>`).join('');
        }

        function toggleCart() { 
            document.getElementById('cartSheet').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function closeAllOverlays() {
            document.getElementById('cartSheet').classList.remove('active'); 
            document.getElementById('overlay').classList.remove('active');
        }

        function sendWhatsApp() {
            if(!cart.length) return; 
            let m = "*" + appSettings.whatsapp_template + "*\n\n"; 
            let t = 0;
            
            cart.forEach(i => { 
                let it = i.price * i.qty; t += it; 
                m += `📦 ${i.qty}x ${i.name}\n   └ السعر: ${it} ${appSettings.currency}\n\n`; 
            });
            
            const finalMsg = m + `\n*🧾 الإجمالي المطلوب: ${t} ${appSettings.currency}*`;
            window.location.href = `https://wa.me/${appSettings.whatsapp_number.replace(/\D/g, '')}?text=${encodeURIComponent(finalMsg)}`;
        }

        // تشغيل التطبيق
        window.onload = initApp;
    </script>
</body>
</html>
