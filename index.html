<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garden Food Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ca143; --primary-light: #e6f9ed; --bg-color: #f7fbf8; --card-bg: #ffffff; --text-dark: #0f2918; --text-muted: #6b8273; --radius-lg: 32px; --transition: transform 0.3s ease, box-shadow 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 130px; }
        
        /* إشعارات */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--primary); color: #fff; padding: 14px 28px; border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(12,161,67,0.3); animation: slideDown 0.4s forwards, fadeOut 0.4s 2s forwards; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-40px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-20px); } }

        /* الهيدر */
        .header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(12, 161, 67, 0.05); position: sticky; top: 0; z-index: 100; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .brand-area { display: flex; align-items: center; gap: 15px; }
        .logo { width: 60px; height: 60px; border-radius: 18px; object-fit: contain; }
        .store-name { font-weight: 900; font-size: 1.5rem; color: var(--text-dark); display: block; }
        .store-desc { font-weight: 700; font-size: 0.9rem; color: var(--primary); }
        .back-btn { background: var(--primary-light); color: var(--primary); border: none; padding: 10px 20px; border-radius: 50px; font-family: 'Tajawal'; font-weight: 800; display: none; cursor: pointer; }

        /* الشبكة */
        .kiosk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 20px; }
        .section-title { grid-column: 1 / -1; font-weight: 900; font-size: 1.5rem; padding: 10px 0; }
        .card-square { background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: 0 12px 35px rgba(12, 161, 67, 0.06); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; border: 1px solid rgba(12, 161, 67, 0.05); transition: var(--transition); }
        .card-square:active { transform: scale(0.95); }
        .cat-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .cat-title { padding: 16px 10px; text-align: center; font-weight: 900; font-size: 1.2rem; }
        .item-card { padding-bottom: 12px; }
        .item-img { width: 100%; aspect-ratio: 1/0.85; object-fit: cover; }
        .item-info { padding: 12px; text-align: center; }
        .item-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }
        .item-price { font-weight: 900; color: var(--primary); background: var(--primary-light); padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
        .add-btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 16px; font-family: 'Tajawal'; font-weight: 900; }

        /* السلة */
        .cart-fab { position: fixed; bottom: 25px; right: 25px; left: 25px; background: var(--text-dark); color: #fff; padding: 18px 25px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transform: translateY(150%); transition: transform 0.3s; z-index: 999; }
        .cart-fab.visible { transform: translateY(0); }
        .fab-badge { background: var(--primary); padding: 4px 14px; border-radius: 50px; }
        
        .cart-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-radius: 40px 40px 0 0; padding: 30px 25px; box-shadow: 0 -15px 50px rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.4s; z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        .cart-sheet.active { transform: translateY(0); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-weight: 900; font-size: 1.5rem; }
        .close-cart { background: var(--primary-light); color: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: 900; cursor: pointer; }
        .cart-items-container { max-height: 45vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cart-item { display: flex; justify-content: space-between; background: var(--bg-color); padding: 15px; border-radius: 20px; }
        .qty-controls { display: flex; gap: 10px; align-items: center; }
        .qty-btn { background: none; border: none; font-size: 1.5rem; font-weight: 900; color: var(--primary); }
        .checkout-btn { background: var(--primary); color: #fff; border: none; padding: 20px; border-radius: 24px; font-family: 'Tajawal'; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 998; }
        .overlay.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <div class="header">
        <div class="brand-area">
            <img src="" alt="Logo" class="logo" id="siteLogo">
            <div>
                <span class="store-name" id="siteName"></span>
                <span class="store-desc" id="siteDesc"></span>
            </div>
        </div>
        <button class="back-btn" id="backBtn" onclick="renderCategories()"></button>
    </div>

    <div class="kiosk-grid" id="mainContainer"></div>

    <div class="cart-fab" id="cartFab" onclick="toggleCart()">
        <div style="font-weight:900; font-size:1.2rem; display:flex; gap:10px;">
            <span id="uiCartWord"></span> <span class="fab-badge" id="fabCount">0</span>
        </div>
        <div style="font-weight:900; font-size:1.2rem;" id="fabTotal">0</div>
    </div>

    <div class="cart-sheet" id="cartSheet">
        <div class="cart-header">
            <h3 id="uiCartTitle"></h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <button class="checkout-btn" onclick="sendWhatsApp()">
            <span id="uiCheckoutBtn"></span><span id="sheetTotal">0</span>
        </button>
    </div>

    <script>
        let appSettings = {}, menuData = [], cart = [];
        function fixUrl(url) { return (!url || url.startsWith('http')) ? url : './' + url.replace(/^\/+/, ''); }
        function showToast(msg) { 
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = `✨ ${msg}`;
            document.getElementById('toast-container').appendChild(t); setTimeout(() => t.remove(), 2500);
        }

        async function initApp() {
            const setRes = await fetch('./settings.json?v=' + Date.now()); appSettings = await setRes.json();
            document.getElementById('siteLogo').src = fixUrl(appSettings.logo);
            document.getElementById('siteName').innerText = appSettings.store_name; document.getElementById('siteDesc').innerText = appSettings.store_desc;
            document.getElementById('backBtn').innerText = appSettings.ui_back; document.getElementById('uiCartWord').innerText = appSettings.ui_cart_word;
            document.getElementById('uiCartTitle').innerText = appSettings.ui_cart_title; document.getElementById('uiCheckoutBtn').innerText = appSettings.ui_checkout_btn;

            const menuRes = await fetch('./menu.json?v=' + Date.now()); const mData = await menuRes.json(); menuData = mData.categories || [];
            renderCategories();
        }

        function renderCategories() {
            const c = document.getElementById('mainContainer'); document.getElementById('backBtn').style.display = 'none';
            c.innerHTML = `<div class="section-title">${appSettings.ui_greeting}</div>`;
            menuData.forEach(cat => {
                c.innerHTML += `<div class="card-square" onclick="renderItems('${cat.id}')"><img src="${fixUrl(cat.image)}" class="cat-img"><div class="cat-title">${cat.name}</div></div>`;
            });
        }

        function renderItems(catId) {
            const cat = menuData.find(c => c.id === catId); if(!cat) return;
            const c = document.getElementById('mainContainer'); document.getElementById('backBtn').style.display = 'block';
            c.innerHTML = `<div class="section-title">${cat.name}</div>`;
            cat.items.forEach(item => {
                c.innerHTML += `<div class="card-square item-card"><img src="${fixUrl(item.image)}" class="item-img"><div class="item-info"><div class="item-title">${item.name}</div><div class="item-price">${item.price} ${appSettings.currency}</div><button class="add-btn" onclick="addToCart(event, '${item.id}', '${item.name}', ${item.price})">${appSettings.ui_add_btn}</button></div></div>`;
            });
        }

        function addToCart(e, id, name, price) {
            e.stopPropagation(); let ex = cart.find(i => i.id === id); if(ex) ex.qty++; else cart.push({id, name, price, qty:1});
            showToast(`تمت إضافة ${name}`); updateCartUI();
        }
        function updateItemQty(id, ch) { let i = cart.findIndex(x => x.id === id); if(i>-1) { cart[i].qty += ch; if(cart[i].qty<=0) cart.splice(i,1); updateCartUI(); } }
        
        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            if(!cart.length) { fab.classList.remove('visible'); document.getElementById('cartSheet').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); return; }
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0), count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('fabCount').innerText = count; document.getElementById('fabTotal').innerText = document.getElementById('sheetTotal').innerText = `${total} ${appSettings.currency}`;
            fab.classList.add('visible');
            document.getElementById('cartItemsList').innerHTML = cart.map(i => `<div class="cart-item"><div><h4 style="font-weight:900;">${i.name}</h4><div style="color:var(--text-muted); margin-top:5px;">${i.price * i.qty} ${appSettings.currency}</div></div><div class="qty-controls"><button class="qty-btn" onclick="updateItemQty('${i.id}',1)">+</button><span style="font-weight:900;font-size:1.2rem">${i.qty}</span><button class="qty-btn" onclick="updateItemQty('${i.id}',-1)">-</button></div></div>`).join('');
        }
        function toggleCart() { document.getElementById('cartSheet').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function sendWhatsApp() {
            if(!cart.length) return; let m = appSettings.whatsapp_template + "\n\n", t = 0;
            cart.forEach(i => { let it = i.price * i.qty; t += it; m += `▪ ${i.qty}x ${i.name} - ${it} ${appSettings.currency}\n`; });
            window.location.href = `https://wa.me/${appSettings.whatsapp_number.replace(/\D/g, '')}?text=${encodeURIComponent(m + `\n*الإجمالي: ${t} ${appSettings.currency}*`)}`;
        }
        initApp();
    </script>
</body>
</html>
