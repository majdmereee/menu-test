backend:
  name: git-gateway
  repo: majdmereee/menu-test
  branch: main
  identity_url: https://auth.decapbridge.com/sites/0794f97d-26ce-425f-a989-e65ae53ce86d
  gateway_url: https://gateway.decapbridge.com

# 🟢 هذا هو السطر السحري لتعريب لوحة التحكم بشكل سليم دون كسر الشاشة
locale: 'ar'

# 🟢 تحديد مجلد الصور (مهم جداً لكي يظهر زر الرفع وتُحفظ الصور بنجاح)
media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "إعدادات التطبيق والنصوص"
    files:
      - file: "settings.json"
        label: "الإعدادات العامة"
        name: "general"
        fields:
          - { label: "شعار الموقع", name: "logo", widget: "image" }
          - { label: "اسم المطعم", name: "store_name", widget: "string" }
          - { label: "الوصف تحت الاسم", name: "store_desc", widget: "string" }
          - { label: "رقم الواتساب (بدون +)", name: "whatsapp_number", widget: "string" }
          - { label: "رسالة الواتساب", name: "whatsapp_template", widget: "text" }
          - { label: "العملة", name: "currency", widget: "string" }
          - { label: "الجملة الترحيبية (فوق الأقسام)", name: "ui_greeting", widget: "string", default: "ماذا تود أن تطلب؟ 😋" }
          - { label: "كلمة (زر الرجوع)", name: "ui_back", widget: "string", default: "رجوع" }
          - { label: "كلمة (السلة) في الزر العائم", name: "ui_cart_word", widget: "string", default: "السلة" }
          - { label: "عنوان نافذة السلة", name: "ui_cart_title", widget: "string", default: "طلباتك 🍔" }
          - { label: "زر (إضافة للسلة)", name: "ui_add_btn", widget: "string", default: "إضافة +" }
          - { label: "زر (إتمام الطلب)", name: "ui_checkout_btn", widget: "string", default: "إرسال الطلب 💬" }

  - name: "menu"
    label: "إدارة المنيو"
    files:
      - file: "menu.json"
        label: "الأقسام والأصناف"
        name: "categories_list"
        fields:
          - label: "الأقسام"
            name: "categories"
            widget: "list"
            fields:
              - { label: "معرف القسم (مثل c1)", name: "id", widget: "string" }
              - { label: "اسم القسم", name: "name", widget: "string" }
              - { label: "صورة القسم", name: "image", widget: "image" }
              - label: "الأصناف"
                name: "items"
                widget: "list"
                fields:
                  - { label: "المعرف (مثل i1)", name: "id", widget: "string" }
                  - { label: "اسم الصنف", name: "name", widget: "string" }
                  - { label: "السعر", name: "price", widget: "string" }
                  - { label: "صورة الصنف", name: "image", widget: "image" }
