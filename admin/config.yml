# ضع إعدادات الـ backend الخاصة بـ DecapBridge هنا كما كانت في ملفك السابق
backend:
  name: git-gateway
  repo: your-username/your-repo
  branch: main
  identity_url: https://auth.decapbridge.com/sites/your-site-id
  gateway_url: https://gateway.decapbridge.com

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "إعدادات التطبيق الأساسية"
    files:
      - file: "settings.json"
        label: "الإعدادات العامة"
        name: "general"
        fields:
          - { label: "شعار الموقع (اللوغو)", name: "logo", widget: "image" }
          - { label: "اسم المطعم", name: "store_name", widget: "string" }
          - { label: "رقم الواتساب (مع رمز الدولة وبدون +)", name: "whatsapp_number", widget: "string" }
          - { label: "نص رسالة الواتساب الافتراضية", name: "whatsapp_template", widget: "text" }
          - { label: "العملة", name: "currency", widget: "string" }
          - { label: "رابط فيسبوك", name: "facebook", widget: "string" }
          - { label: "رابط انستغرام", name: "instagram", widget: "string" }

  - name: "menu"
    label: "إدارة المنيو (الأقسام والأصناف)"
    files:
      - file: "menu.json"
        label: "الأقسام"
        name: "categories_list"
        fields:
          - label: "الأقسام النشطة"
            name: "categories"
            widget: "list"
            fields:
              - { label: "معرف فريد للقسم (حروف انجليزية فقط مثل c1)", name: "id", widget: "string" }
              - { label: "اسم القسم", name: "name", widget: "string" }
              - { label: "صورة القسم", name: "image", widget: "image" }
              - label: "الأصناف داخل هذا القسم"
                name: "items"
                widget: "list"
                fields:
                  - { label: "معرف فريد للصنف (مثل i1)", name: "id", widget: "string" }
                  - { label: "اسم الصنف", name: "name", widget: "string" }
                  - { label: "وصف الصنف", name: "description", widget: "text" }
                  - { label: "السعر", name: "price", widget: "string" }
                  - { label: "صورة الصنف", name: "image", widget: "image" }
