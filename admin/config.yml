backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # ضع اسم حسابك ومستودعك هنا
  branch: main
  base_url: https://api.decapbridge.com # هذا هو الرابط الصحيح والجديد
  auth_endpoint: /oauth/auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "menu"
    label: "قائمة الطعام (المنيو)"
    files:
      - file: "menu.json"
        label: "الأطباق"
        name: "meals_list"
        fields:
          - label: "الأطباق النشطة"
            name: "meals"
            widget: "list"
            fields:
              - { label: "اسم الطبق", name: "title", widget: "string" }
              - { label: "الوصف", name: "description", widget: "text" }
              - { label: "السعر", name: "price", widget: "string" }
