<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة Garden Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --primary: #0ca143; --primary-light: #e6f9ed; --bg: #f4f7f6; --surface: #ffffff; --text-dark: #111827; --text-muted: #6b7280; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6; --radius-lg: 24px; --radius-md: 16px; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-dark); padding-bottom: 90px; overflow-x: hidden; }

        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; font-weight: 900; color: var(--primary); font-size: 1.2rem; display: none; backdrop-filter: blur(5px); }
        .spinner { width: 45px; height: 45px; border: 5px solid var(--primary-light); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #loginScreen { position: fixed; inset: 0; background: var(--surface); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .login-box { width: 100%; max-width: 400px; }
        .login-box input { width: 100%; padding: 18px; border-radius: var(--radius-md); border: 2px solid #eee; font-size: 1rem; text-align: left; direction: ltr; margin: 20px 0; outline: none; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(12, 161, 67, 0.2); transition: var(--transition); }
        
        .save-all-banner { position: fixed; top: 15px; left: 15px; right: 15px; background: var(--text-dark); color: #fff; padding: 16px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; text-align: center; cursor: pointer; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-150%); transition: transform 0.4s; border: 2px solid #333; }
        .save-all-banner.visible { transform: translateY(0); }

        .app-header { background: var(--surface); padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 100; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; justify-content: space-around; padding: 15px 10px 25px 10px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); cursor: pointer; width: 33%; font-weight: 800; font-size: 0.9rem; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--surface); padding: 12px; border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; display: flex; gap: 12px; align-items: center; border: 1px solid rgba(0,0,0,0.02); }
        .card img { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
        .card-info { flex-grow: 1; min-width: 0; }
        .card-info h3 { font-weight: 900; font-size: 1.1rem; margin-bottom: 3px; }
        .card-info p { font-weight: 800; color: var(--primary); font-size: 0.95rem; }
        
        .actions-group { display: flex; flex-direction: column; gap: 6px; }
        .actions-row { display: flex; gap: 6px; justify-content: flex-end; }
        .action-btn { background: var(--bg); border: none; width: 34px; height: 34px; border-radius: 10px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-btn.delete { color: var(--danger); background: #fee2e2; }
        .action-btn.edit { color: var(--info); background: #e0f2fe; }
        .action-btn.move { color: var(--text-dark); background: #f3f4f6; }

        .fab { position: fixed; bottom: 100px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 22px; font-size: 2rem; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(12, 161, 67, 0.4); border: none; z-index: 99; cursor: pointer; }

        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sheet-overlay.active { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 35px 35px 0 0; padding: 25px 20px 40px 20px; z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 -15px 40px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-sheet { background: var(--bg); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; color: var(--text-dark); }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 16px; border-radius: var(--radius-md); border: 2px solid #eee; font-family: 'Tajawal'; font-size: 1rem; font-weight: 700; outline: none; background: var(--bg); }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); background: var(--surface); }
        
        .image-upload-box { background: var(--bg); border: 2px dashed #cbd5e1; border-radius: var(--radius-lg); padding: 30px 20px; text-align: center; position: relative; margin-bottom: 20px; cursor: pointer; }
        .image-upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .image-upload-box img { max-width: 100%; max-height: 200px; border-radius: 12px; margin-top: 15px; display: none; object-fit: contain; }
        
        .section-title { font-weight: 900; font-size: 1.2rem; color: var(--primary); margin: 25px 0 15px 0; display: flex; align-items: center; gap: 8px; }

        /* نافذة القص */
        .crop-modal { position: fixed; inset: 0; background: #000; z-index: 10005; display: none; flex-direction: column; }
        .crop-area { flex-grow: 1; overflow: hidden; background: #111; }
        .crop-actions { background: #222; padding: 20px; display: flex; justify-content: space-between; gap: 15px; }
        .crop-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; font-family: 'Tajawal'; }
        .crop-btn.confirm { background: var(--primary); color: white; }
        .crop-btn.cancel { background: #444; color: white; }
    </style>
</head>
<body>

    <div id="saveAllBanner" class="save-all-banner" onclick="saveAllChanges()"><span>💾</span> حفظ جميع التعديلات في الموقع</div>
    <div class="loader-overlay" id="loader"><div class="spinner"></div><span id="loaderText">جاري تحميل البيانات...</span></div>

    <div id="loginScreen">
        <h1 style="font-weight:900; color:var(--primary); font-size:2rem; margin-bottom:10px;">إدارة المطعم 👨‍🍳</h1>
        <div class="login-box">
            <input type="password" id="ghToken" placeholder="أدخل مفتاح GitHub (ghp_...)">
            <button class="btn-primary" onclick="initApp()">دخول للوحة</button>
        </div>
    </div>

    <div class="app-header"><h1 id="headerTitle">المنتجات 🍔</h1></div>

    <div id="view-products" class="view active">
        <div id="productsList"></div>
        <button class="fab" onclick="openProductSheet()">+</button>
    </div>

    <div id="view-categories" class="view">
        <div id="categoriesList"></div>
        <button class="fab" onclick="openCategorySheet()">+</button>
    </div>

    <div id="view-settings" class="view">
        <div class="card" style="flex-direction: column; align-items: stretch; gap: 0;">
            <div class="section-title">✨ الهوية والأرقام</div>
            
            <label style="font-weight:800; margin-bottom:10px; display:block;">شعار المطعم (اللوغو)</label>
            <div class="image-upload-box">
                <input type="file" accept="image/*" onchange="handleLogoSelection(event)">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div><div style="font-weight:800;">تغيير الشعار</div>
                <img id="sLogoPreview" src="">
            </div>

            <div class="input-group"><label>اسم المطعم</label><input type="text" id="sName" oninput="updateSetting('store_name', this.value)"></div>
            <div class="input-group"><label>الوصف أسفل الاسم</label><input type="text" id="sDesc" oninput="updateSetting('store_desc', this.value)"></div>
            <div class="input-group"><label>الوصف التسويقي (الاحترافي)</label><textarea id="sHero" rows="3" oninput="updateSetting('hero_subtitle', this.value)"></textarea></div>
            <div class="input-group"><label>رابط فيسبوك (اتركه فارغاً لإخفائه)</label><input type="text" id="sFb" oninput="updateSetting('facebook_url', this.value)"></div>
            <div class="input-group"><label>رابط انستغرام (اتركه فارغاً لإخفائه)</label><input type="text" id="sInsta" oninput="updateSetting('instagram_url', this.value)"></div>
            
            <div class="input-group"><label>رقم الواتساب (بدون +)</label><input type="text" id="sWhatsApp" oninput="updateSetting('whatsapp_number', this.value)"></div>
            <div class="input-group"><label>رسالة الواتساب التلقائية</label><textarea id="sMsg" rows="2" oninput="updateSetting('whatsapp_template', this.value)"></textarea></div>
            <div class="input-group"><label>العملة</label><input type="text" id="sCurrency" oninput="updateSetting('currency', this.value)"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('products', 'المنتجات 🍔', this)"><span>🍔</span><span>المنتجات</span></div>
        <div class="nav-item" onclick="switchTab('categories', 'الأقسام 🗂️', this)"><span>🗂️</span><span>الأقسام</span></div>
        <div class="nav-item" onclick="switchTab('settings', 'الإعدادات ⚙️', this)"><span>⚙️</span><span>الإعدادات</span></div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheets()"></div>

    <div class="bottom-sheet" id="productSheet">
        <div class="sheet-header"><h2 id="pSheetTitle">إضافة منتج</h2><button class="close-sheet" onclick="closeSheets()">✕</button></div>
        <div class="input-group"><label>اسم المنتج</label><input type="text" id="pName"></div>
        <div class="input-group"><label>الوصف</label><textarea id="pDesc" rows="2"></textarea></div>
        <div class="input-group"><label>السعر</label><input type="number" id="pPrice"></div>
        <div class="input-group"><label>القسم</label><select id="pCategory"></select></div>
        <div class="image-upload-box">
            <input type="file" id="pImage" accept="image/*" onchange="openCropper(event, 'product')">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div><div style="font-weight:800;">تغيير الصورة</div>
            <img id="pPreview" src="">
        </div>
        <button class="btn-primary" onclick="applyProductChange()">تأكيد وإضافة ✔️</button>
    </div>

    <div class="bottom-sheet" id="categorySheet">
        <div class="sheet-header"><h2 id="cSheetTitle">إضافة قسم</h2><button class="close-sheet" onclick="closeSheets()">✕</button></div>
        <div class="input-group"><label>اسم القسم</label><input type="text" id="cName"></div>
        <div class="image-upload-box">
            <input type="file" id="cImage" accept="image/*" onchange="openCropper(event, 'category')">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div><div style="font-weight:800;">تغيير الصورة</div>
            <img id="cPreview" src="">
        </div>
        <button class="btn-primary" onclick="applyCategoryChange()">تأكيد وإضافة ✔️</button>
    </div>

    <!-- نافذة قص الصورة المخصصة -->
    <div class="crop-modal" id="cropModal">
        <div class="crop-area"><img id="cropperImage" style="max-width: 100%;"></div>
        <div class="crop-actions">
            <button class="crop-btn cancel" onclick="cancelCrop()">إلغاء</button>
            <button class="crop-btn confirm" onclick="confirmCrop()">تأكيد القص</button>
        </div>
    </div>

    <script>
        const REPO = 'majdmereee/menu-test';
        let PAT = localStorage.getItem('gh_pat'), menuData = { categories: [] }, appSettings = {};
        let editId = null, editOldCatId = null, currentImgPath = null, currentThumbPath = null; 
        
        let tempUploads = { product: null, category: null, settings: null };
        let cropperInstance = null; let currentCropType = null; let originalFileName = "";

        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }
        if (PAT) { document.getElementById('loginScreen').style.display = 'none'; loadData(); }

        async function initApp() {
            const token = document.getElementById('ghToken').value.trim();
            if(!token) return alert("أدخل الرمز");
            PAT = token; localStorage.setItem('gh_pat', PAT);
            document.getElementById('loginScreen').style.display = 'none'; await loadData();
        }

        function markUnsaved() { document.getElementById('saveAllBanner').classList.add('visible'); }
        function getImgSrc(imgStr) { return (!imgStr) ? 'https://via.placeholder.com/70' : (imgStr.startsWith('data:image') ? imgStr : `../${imgStr.replace('./', '')}`); }

        async function ghApi(path, method = 'GET', body = null) {
            const options = { method, headers: { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json' }, cache: 'no-store' };
            if(body) options.body = JSON.stringify(body);
            const url = method === 'GET' ? `https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}` : `https://api.github.com/repos/${REPO}/contents/${path}`;
            const res = await fetch(url, options);
            if (!res.ok) {
                if (res.status === 401 || res.status === 404) { localStorage.removeItem('gh_pat'); location.reload(); }
                throw new Error(await res.text());
            }
            return res.json();
        }

        async function loadData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const sData = await ghApi('settings.json'); appSettings = JSON.parse(atou(sData.content));
                populateSettingsUI();
                const mData = await ghApi('menu.json'); menuData = JSON.parse(atou(mData.content));
                renderCategories(); renderProducts();
            } catch (e) { alert("خطأ:\n" + e.message); }
            document.getElementById('loader').style.display = 'none';
        }

        function switchTab(tabId, title, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active'); element.classList.add('active');
            document.getElementById('headerTitle').innerText = title; window.scrollTo(0, 0);
        }

        function closeSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); document.getElementById('sheetOverlay').classList.remove('active'); }

        // ================= Settings =================
        function populateSettingsUI() {
            const map = { sName:'store_name', sDesc:'store_desc', sHero:'hero_subtitle', sFb:'facebook_url', sInsta:'instagram_url', sWhatsApp:'whatsapp_number', sMsg:'whatsapp_template', sCurrency:'currency' };
            for(let id in map) if(document.getElementById(id)) document.getElementById(id).value = appSettings[map[id]] || '';
            if(appSettings.logo) { document.getElementById('sLogoPreview').src = getImgSrc(appSettings.logo); document.getElementById('sLogoPreview').style.display = 'inline-block'; }
        }
        function updateSetting(k, v) { appSettings[k] = v; markUnsaved(); }
        
        function handleLogoSelection(e) {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader(); r.onload = function(ev) {
                document.getElementById('sLogoPreview').src = ev.target.result; document.getElementById('sLogoPreview').style.display = 'inline-block';
                tempUploads.settings = { base64: ev.target.result.split(',')[1], ext: file.name.split('.').pop(), fullData: ev.target.result };
                appSettings.logo = ev.target.result; markUnsaved();
            }; r.readAsDataURL(file);
        }

        // ================= Cropper Logic =================
        function openCropper(event, type) {
            const file = event.target.files[0]; if(!file) return;
            currentCropType = type; originalFileName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('cropperImage').src = e.target.result;
                document.getElementById('cropModal').style.display = 'flex';
                if(cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper(document.getElementById('cropperImage'), {
                    aspectRatio: 1, viewMode: 2, dragMode: 'move', autoCropArea: 0.9
                });
            }; reader.readAsDataURL(file);
            event.target.value = ''; // reset
        }

        function cancelCrop() { document.getElementById('cropModal').style.display = 'none'; if(cropperInstance) cropperInstance.destroy(); }

        function confirmCrop() {
            if(!cropperInstance) return;
            // 1. الصورة المصغرة المربعة للموقع (360x360)
            const thumbCanvas = cropperInstance.getCroppedCanvas({ width: 360, height: 360 });
            const thumbDataUrl = thumbCanvas.toDataURL('image/jpeg', 0.8);
            
            // 2. الصورة الأصلية مضغوطة بحجم منطقي لسرعة الفتح (max 600px)
            const origCanvas = cropperInstance.getCroppedCanvas(); // get full canvas (but we want original ratio without crop? Actually user said crop is applied, but original is preserved. Let's just compress the original image directly from the img tag).
            const rawImg = document.getElementById('cropperImage');
            
            const maxDimension = 600;
            let finalW = rawImg.naturalWidth, finalH = rawImg.naturalHeight;
            if(finalW > maxDimension || finalH > maxDimension) {
                if(finalW > finalH) { finalH = Math.floor(finalH * (maxDimension/finalW)); finalW = maxDimension; } 
                else { finalW = Math.floor(finalW * (maxDimension/finalH)); finalH = maxDimension; }
            }
            const tmpCanvas = document.createElement('canvas'); tmpCanvas.width = finalW; tmpCanvas.height = finalH;
            tmpCanvas.getContext('2d').drawImage(rawImg, 0, 0, finalW, finalH);
            const origDataUrl = tmpCanvas.toDataURL('image/jpeg', 0.8);

            const ext = 'jpg';
            const uploadObj = {
                thumbBase64: thumbDataUrl.split(',')[1],
                origBase64: origDataUrl.split(',')[1],
                thumbFull: thumbDataUrl, origFull: origDataUrl, ext
            };

            if(currentCropType === 'product') {
                tempUploads.product = uploadObj;
                document.getElementById('pPreview').src = thumbDataUrl; document.getElementById('pPreview').style.display = 'inline-block';
            } else {
                tempUploads.category = uploadObj;
                document.getElementById('cPreview').src = thumbDataUrl; document.getElementById('cPreview').style.display = 'inline-block';
            }
            cancelCrop();
        }

        // ================= Categories & Products Rendering =================
        function renderCategories() {
            const list = document.getElementById('categoriesList'); list.innerHTML = '';
            menuData.categories.forEach((cat, index) => {
                list.innerHTML += `<div class="card"><img src="${getImgSrc(cat.thumb || cat.image)}"><div class="card-info"><h3>${cat.name}</h3></div>
                <div class="actions-group"><div class="actions-row"><button class="action-btn edit" onclick="openCategorySheet('${cat.id}')">✏️</button><button class="action-btn delete" onclick="deleteCategory('${cat.id}')">🗑️</button></div></div></div>`;
            });
        }
        function renderProducts() {
            const list = document.getElementById('productsList'); list.innerHTML = '';
            menuData.categories.forEach(cat => {
                (cat.items || []).forEach((item, index) => {
                    list.innerHTML += `<div class="card"><img src="${getImgSrc(item.thumb || item.image)}"><div class="card-info"><h3>${item.name}</h3><p>${item.price}</p></div>
                    <div class="actions-group"><div class="actions-row"><button class="action-btn edit" onclick="openProductSheet('${cat.id}', '${item.id}')">✏️</button><button class="action-btn delete" onclick="deleteItem('${cat.id}', '${item.id}')">🗑️</button></div></div></div>`;
                });
            });
        }

        function openCategorySheet(id = null) {
            editId = id; tempUploads.category = null; document.getElementById('cSheetTitle').innerText = id ? 'تعديل القسم' : 'إضافة قسم';
            if(id) {
                const cat = menuData.categories.find(c => c.id === id);
                document.getElementById('cName').value = cat.name; currentImgPath = cat.image; currentThumbPath = cat.thumb;
                document.getElementById('cPreview').src = getImgSrc(cat.thumb || cat.image); document.getElementById('cPreview').style.display = 'inline-block';
            } else { document.getElementById('cName').value = ''; currentImgPath = null; currentThumbPath = null; document.getElementById('cPreview').style.display = 'none'; }
            document.getElementById('sheetOverlay').classList.add('active'); document.getElementById('categorySheet').classList.add('active');
        }

        function applyCategoryChange() {
            const name = document.getElementById('cName').value;
            if(!name || (!tempUploads.category && !editId && !currentImgPath)) return alert("الاسم والصورة مطلوبان");
            
            let catObj = editId ? menuData.categories.find(c => c.id === editId) : { id: `c_${Date.now()}`, items: [] };
            catObj.name = name;
            
            if(tempUploads.category) {
                catObj.tempBase64Orig = tempUploads.category.origBase64; catObj.tempBase64Thumb = tempUploads.category.thumbBase64; catObj.tempExt = tempUploads.category.ext;
                catObj.image = tempUploads.category.origFull; catObj.thumb = tempUploads.category.thumbFull;
            }
            if(!editId) menuData.categories.push(catObj);
            markUnsaved(); renderCategories(); closeSheets();
        }

        function openProductSheet(catId = null, itemId = null) {
            editId = itemId; editOldCatId = catId; tempUploads.product = null;
            document.getElementById('pCategory').innerHTML = menuData.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if(itemId) {
                const cat = menuData.categories.find(c => c.id === catId); const item = cat.items.find(i => i.id === itemId);
                document.getElementById('pName').value = item.name; document.getElementById('pDesc').value = item.description || '';
                document.getElementById('pPrice').value = item.price; document.getElementById('pCategory').value = catId;
                document.getElementById('pPreview').src = getImgSrc(item.thumb || item.image); document.getElementById('pPreview').style.display = 'inline-block';
            } else {
                document.getElementById('pName').value = ''; document.getElementById('pDesc').value = ''; document.getElementById('pPrice').value = '';
                document.getElementById('pPreview').style.display = 'none';
            }
            document.getElementById('sheetOverlay').classList.add('active'); document.getElementById('productSheet').classList.add('active');
        }

        function applyProductChange() {
            const name = document.getElementById('pName').value, desc = document.getElementById('pDesc').value, price = document.getElementById('pPrice').value, newCatId = document.getElementById('pCategory').value;
            if(!name || !price) return alert("أكمل البيانات");
            let itemObj;
            if(editId) {
                if(editOldCatId !== newCatId) {
                    const oldCat = menuData.categories.find(c => c.id === editOldCatId); itemObj = oldCat.items.find(i => i.id === editId);
                    oldCat.items = oldCat.items.filter(i => i.id !== editId); menuData.categories.find(c => c.id === newCatId).items.push(itemObj);
                } else itemObj = menuData.categories.find(c => c.id === newCatId).items.find(i => i.id === editId);
            } else { itemObj = { id: `i_${Date.now()}` }; menuData.categories.find(c => c.id === newCatId).items.push(itemObj); }

            itemObj.name = name; itemObj.description = desc; itemObj.price = price;
            if(tempUploads.product) {
                itemObj.tempBase64Orig = tempUploads.product.origBase64; itemObj.tempBase64Thumb = tempUploads.product.thumbBase64; itemObj.tempExt = tempUploads.product.ext;
                itemObj.image = tempUploads.product.origFull; itemObj.thumb = tempUploads.product.thumbFull;
            }
            markUnsaved(); renderProducts(); closeSheets();
        }

        function deleteCategory(id) { if(confirm("سيتم الحذف نهائياً")) { menuData.categories = menuData.categories.filter(c => c.id !== id); markUnsaved(); renderCategories(); renderProducts(); } }
        function deleteItem(catId, itemId) { if(confirm("تأكيد الحذف؟")) { const cat = menuData.categories.find(c => c.id === catId); cat.items = cat.items.filter(i => i.id !== itemId); markUnsaved(); renderProducts(); } }

        // ================= Bulk Save =================
        async function saveAllChanges() {
            document.getElementById('loader').style.display = 'flex';
            try {
                if (tempUploads.settings) {
                    const path = `images/logo_${Date.now()}.${tempUploads.settings.ext}`;
                    await ghApi(path, 'PUT', { message: 'Update Logo', content: tempUploads.settings.base64 });
                    appSettings.logo = `./${path}`; tempUploads.settings = null;
                }

                for (let cat of menuData.categories) {
                    if (cat.tempBase64Orig) {
                        const rnd = Math.floor(Math.random()*1000);
                        const pOrig = `images/c_orig_${Date.now()}_${rnd}.${cat.tempExt}`;
                        const pThumb = `images/c_thumb_${Date.now()}_${rnd}.${cat.tempExt}`;
                        await ghApi(pOrig, 'PUT', { message: 'Upload Orig', content: cat.tempBase64Orig });
                        await ghApi(pThumb, 'PUT', { message: 'Upload Thumb', content: cat.tempBase64Thumb });
                        cat.image = `./${pOrig}`; cat.thumb = `./${pThumb}`;
                        delete cat.tempBase64Orig; delete cat.tempBase64Thumb; delete cat.tempExt;
                    }
                    if (cat.items) {
                        for (let item of cat.items) {
                            if (item.tempBase64Orig) {
                                const rnd = Math.floor(Math.random()*1000);
                                const pOrig = `images/i_orig_${Date.now()}_${rnd}.${item.tempExt}`;
                                const pThumb = `images/i_thumb_${Date.now()}_${rnd}.${item.tempExt}`;
                                await ghApi(pOrig, 'PUT', { message: 'Upload Orig', content: item.tempBase64Orig });
                                await ghApi(pThumb, 'PUT', { message: 'Upload Thumb', content: item.tempBase64Thumb });
                                item.image = `./${pOrig}`; item.thumb = `./${pThumb}`;
                                delete item.tempBase64Orig; delete item.tempBase64Thumb; delete item.tempExt;
                            }
                        }
                    }
                }

                const liveSettings = await ghApi('settings.json');
                await ghApi('settings.json', 'PUT', { message: "Update Settings", content: utoa(JSON.stringify(appSettings, null, 2)), sha: liveSettings.sha });

                const liveMenu = await ghApi('menu.json');
                await ghApi('menu.json', 'PUT', { message: "Bulk Update", content: utoa(JSON.stringify(menuData, null, 2)), sha: liveMenu.sha });
                
                document.getElementById('saveAllBanner').classList.remove('visible');
                alert("تم تحديث موقعك بنجاح! 🎉");
            } catch (e) { alert("فشل الرفع\n" + e.message); }
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
