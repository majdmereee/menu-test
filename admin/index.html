<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لوحة تحكم | Garden Food</title>
  <link rel="icon" type="image/jpeg" href="/images/PhotoRoom-20260715_012445.jpg">
  
  <!-- استدعاء خط تجوال -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* فرض الخط على كل النظام */
    * { font-family: 'Tajawal', sans-serif !important; }
    
    body { background-color: #f4f7f6 !important; }

    /* 📱 تحسينات جذرية لشاشات الموبايل 📱 */
    @media (max-width: 768px) {
      
      /* تكبير الحقول ومنع الزوم التلقائي المزعج */
      input, textarea, select {
        font-size: 16px !important; 
        padding: 14px !important;
        border-radius: 12px !important;
        border: 1px solid #ddd !important;
      }

      /* تحسين الأزرار لتناسب حجم الإصبع */
      button {
        min-height: 48px !important; 
        border-radius: 12px !important;
        font-weight: bold !important;
      }

      /* تحسين شكل القوائم والأصناف لتصبح كروت تفاعلية */
      a[href^="#/collections/"] {
        background-color: white !important;
        padding: 18px !important;
        margin-bottom: 12px !important;
        border-radius: 16px !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
        display: block !important;
      }

      /* إصلاح نافذة رفع الصور لتملأ الشاشة وتصبح واضحة */
      div[role="dialog"] {
        width: 95vw !important;
        height: 90vh !important;
        max-width: none !important;
        max-height: none !important;
        margin: 5vh auto !important;
        border-radius: 20px !important;
        overflow: hidden !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2) !important;
      }

      /* تكبير زر الرجوع والحفظ في شاشة التعديل */
      .nc-appHeader-container {
        padding: 10px !important;
      }
      
      /* تباعد أفضل بين الحقول عند إضافة صنف جديد */
      .nc-controlPane-widget {
        margin-bottom: 25px !important;
        background: white !important;
        padding: 15px !important;
        border-radius: 12px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03) !important;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
</body>
</html>
