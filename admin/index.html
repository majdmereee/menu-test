<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة Garden Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ca143; --primary-light: #e6f9ed; --bg: #f4f7f6; --surface: #ffffff;
            --text-dark: #111827; --text-muted: #6b7280; --danger: #ef4444; --warning: #f59e0b;
            --info: #3b82f6; --radius-lg: 24px; --radius-md: 16px; --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-dark); padding-bottom: 90px; overflow-x: hidden; }

        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; font-weight: 900; color: var(--primary); font-size: 1.2rem; display: none; backdrop-filter: blur(5px); }
        .spinner { width: 45px; height: 45px; border: 5px solid var(--primary-light); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #loginScreen { position: fixed; inset: 0; background: var(--surface); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .login-box { width: 100%; max-width: 400px; }
        .login-box input { width: 100%; padding: 18px; border-radius: var(--radius-md); border: 2px solid #eee; font-size: 1rem; text-align: left; direction: ltr; margin: 20px 0; outline: none; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(12, 161, 67, 0.2); transition: var(--transition); }
        .btn-primary:active { transform: scale(0.95); }
        
        .save-all-banner { position: fixed; top: 15px; left: 15px; right: 15px; background: var(--text-dark); color: #fff; padding: 16px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; text-align: center; cursor: pointer; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; justify-content: center; align-items: center; gap: 10px; border: 2px solid #333; }
        .save-all-banner.visible { transform: translateY(0); }

        .app-header { background: var(--surface); padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 100; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); }
        .app-header h1 { font-weight: 900; font-size: 1.5rem; color: var(--text-dark); margin: 0; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; justify-content: space-around; padding: 15px 10px 25px 10px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); cursor: pointer; width: 33%; font-weight: 800; font-size: 0.9rem; transition: var(--transition); }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--surface); padding: 12px; border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; display: flex; gap: 12px; align-items: center; border: 1px solid rgba(0,0,0,0.02); }
        .card img { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
        .card-info { flex-grow: 1; min-width: 0; }
        .card-info h3 { font-weight: 900; font-size: 1.1rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-weight: 800; color: var(--primary); font-size: 0.95rem; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .actions-group { display: flex; flex-direction: column; gap: 6px; }
        .actions-row { display: flex; gap: 6px; justify-content: flex-end; }
        .action-btn { background: var(--bg); border: none; width: 34px; height: 34px; border-radius: 10px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.delete { color: var(--danger); background: #fee2e2; }
        .action-btn.edit { color: var(--info); background: #e0f2fe; }
        .action-btn.move { color: var(--text-dark); background: #f3f4f6; }

        .fab { position: fixed; bottom: 100px; right: 20px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 22px; font-size: 2rem; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(12, 161, 67, 0.4); border: none; z-index: 99; cursor: pointer; transition: var(--transition); }
        .fab:active { transform: scale(0.9); }

        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sheet-overlay.active { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 35px 35px 0 0; padding: 25px 20px 40px 20px; z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 -15px 40px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sheet-header h2 { font-weight: 900; font-size: 1.4rem; }
        .close-sheet { background: var(--bg); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; color: var(--text-dark); }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 16px; border-radius: var(--radius-md); border: 2px solid #eee; font-family: 'Tajawal'; font-size: 1rem; font-weight: 700; outline: none; background: var(--bg); transition: var(--transition); }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); background: var(--surface); }
        
        .image-upload-box { background: var(--bg); border: 2px dashed #cbd5e1; border-radius: var(--radius-lg); padding: 30px 20px; text-align: center; position: relative; margin-bottom: 20px; cursor: pointer; transition: var(--transition); }
        .image-upload-box:active { background: #e2e8f0; }
        .image-upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .image-upload-box img { max-width: 100%; max-height: 200px; border-radius: 12px; margin-top: 15px; display: none; object-fit: contain; }
        
        .section-title { font-weight: 900; font-size: 1.2rem; color: var(--primary); margin: 25px 0 15px 0; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <!-- شريط الحفظ الشامل -->
    <div id="saveAllBanner" class="save-all-banner" onclick="saveAllChanges()">
        <span>💾</span> حفظ جميع التعديلات في الموقع
    </div>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <span id="loaderText">جاري تحميل البيانات...</span>
    </div>

    <div id="loginScreen">
        <h1 style="font-weight:900; color:var(--primary); font-size:2rem; margin-bottom:10px;">إدارة المطعم 👨‍🍳</h1>
        <div class="login-box">
            <input type="password" id="ghToken" placeholder="أدخل مفتاح GitHub (ghp_...)">
            <button class="btn-primary" onclick="initApp()">دخول للوحة</button>
        </div>
    </div>

    <div class="app-header">
        <h1 id="headerTitle">المنتجات 🍔</h1>
    </div>

    <!-- 1. واجهة المنتجات -->
    <div id="view-products" class="view active">
        <div id="productsList"></div>
        <button class="fab" onclick="openProductSheet()">+</button>
    </div>

    <!-- 2. واجهة الأقسام -->
    <div id="view-categories" class="view">
        <div id="categoriesList"></div>
        <button class="fab" onclick="openCategorySheet()">+</button>
    </div>

    <!-- 3. واجهة الإعدادات (تم إعادتها كاملةً) -->
    <div id="view-settings" class="view">
        <div class="card" style="flex-direction: column; align-items: stretch; gap: 0;">
            <div class="section-title">✨ الهوية والأرقام</div>
            
            <label style="font-weight:800; margin-bottom:10px; display:block;">شعار المطعم (اللوغو)</label>
            <div class="image-upload-box">
                <input type="file" accept="image/*" onchange="previewSettingImage(event)">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div>
                <div style="font-weight:800;">تغيير الشعار</div>
                <img id="sLogoPreview" src="">
            </div>

            <div class="input-group"><label>اسم المطعم</label><input type="text" id="sName" oninput="updateSetting('store_name', this.value)"></div>
            <div class="input-group"><label>الوصف أسفل الاسم</label><input type="text" id="sDesc" oninput="updateSetting('store_desc', this.value)"></div>
            <div class="input-group"><label>رقم الواتساب (بدون +)</label><input type="text" id="sWhatsApp" oninput="updateSetting('whatsapp_number', this.value)"></div>
            <div class="input-group"><label>رسالة الواتساب التلقائية</label><textarea id="sMsg" rows="2" oninput="updateSetting('whatsapp_template', this.value)"></textarea></div>
            <div class="input-group"><label>العملة</label><input type="text" id="sCurrency" oninput="updateSetting('currency', this.value)"></div>

            <div class="section-title">✍️ نصوص الواجهة (المنيو)</div>
            <div class="input-group"><label>الجملة الترحيبية (أعلى الأقسام)</label><input type="text" id="sUiGreeting" oninput="updateSetting('ui_greeting', this.value)"></div>
            <div class="input-group"><label>كلمة (زر الرجوع)</label><input type="text" id="sUiBack" oninput="updateSetting('ui_back', this.value)"></div>
            <div class="input-group"><label>كلمة (السلة) في الزر العائم</label><input type="text" id="sUiCartWord" oninput="updateSetting('ui_cart_word', this.value)"></div>
            <div class="input-group"><label>عنوان نافذة السلة</label><input type="text" id="sUiCartTitle" oninput="updateSetting('ui_cart_title', this.value)"></div>
            <div class="input-group"><label>زر (إضافة للسلة)</label><input type="text" id="sUiAddBtn" oninput="updateSetting('ui_add_btn', this.value)"></div>
            <div class="input-group"><label>زر (إتمام الطلب)</label><input type="text" id="sUiCheckoutBtn" oninput="updateSetting('ui_checkout_btn', this.value)"></div>
        </div>
    </div>

    <!-- شريط التنقل -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('products', 'المنتجات 🍔', this)">
            <span class="nav-icon">🍔</span><span>المنتجات</span>
        </div>
        <div class="nav-item" onclick="switchTab('categories', 'الأقسام 🗂️', this)">
            <span class="nav-icon">🗂️</span><span>الأقسام</span>
        </div>
        <div class="nav-item" onclick="switchTab('settings', 'الإعدادات ⚙️', this)">
            <span class="nav-icon">⚙️</span><span>الإعدادات</span>
        </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheets()"></div>

    <!-- نافذة المنتج -->
    <div class="bottom-sheet" id="productSheet">
        <div class="sheet-header">
            <h2 id="pSheetTitle">إضافة منتج</h2>
            <button class="close-sheet" onclick="closeSheets()">✕</button>
        </div>
        <div class="input-group"><label>اسم المنتج</label><input type="text" id="pName"></div>
        <div class="input-group"><label>الوصف</label><textarea id="pDesc" rows="2"></textarea></div>
        <div class="input-group"><label>السعر</label><input type="number" id="pPrice"></div>
        <div class="input-group"><label>القسم</label><select id="pCategory"></select></div>
        <div class="image-upload-box">
            <input type="file" id="pImage" accept="image/*" onchange="previewImage(event, 'pPreview')">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div>
            <div style="font-weight:800;">تغيير الصورة</div>
            <img id="pPreview" src="">
        </div>
        <button class="btn-primary" onclick="applyProductChange()">تم (تأكيد التعديل) ✔️</button>
    </div>

    <!-- نافذة القسم -->
    <div class="bottom-sheet" id="categorySheet">
        <div class="sheet-header">
            <h2 id="cSheetTitle">إضافة قسم</h2>
            <button class="close-sheet" onclick="closeSheets()">✕</button>
        </div>
        <div class="input-group"><label>اسم القسم</label><input type="text" id="cName"></div>
        <div class="image-upload-box">
            <input type="file" id="cImage" accept="image/*" onchange="previewImage(event, 'cPreview')">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📸</div>
            <div style="font-weight:800;">تغيير الصورة</div>
            <img id="cPreview" src="">
        </div>
        <button class="btn-primary" onclick="applyCategoryChange()">تم (تأكيد التعديل) ✔️</button>
    </div>

    <script>
        const REPO = 'majdmereee/menu-test';
        let PAT = localStorage.getItem('gh_pat');
        let menuData = { categories: [] };
        let appSettings = {};
        
        let hasUnsavedChanges = false;
        let editId = null;
        let editOldCatId = null; 
        let currentImgPath = null; 
        
        // ذاكرة الصور المؤقتة
        let tempUploads = { product: null, category: null, settings: null };

        // دوال التشفير العربية
        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        if (PAT) { document.getElementById('loginScreen').style.display = 'none'; loadData(); }

        async function initApp() {
            const token = document.getElementById('ghToken').value.trim();
            if(!token) return alert("أدخل الرمز من فضلك");
            PAT = token; localStorage.setItem('gh_pat', PAT);
            document.getElementById('loginScreen').style.display = 'none';
            await loadData();
        }

        function showLoader(text) { document.getElementById('loaderText').innerText = text; document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        function markUnsaved() {
            hasUnsavedChanges = true;
            document.getElementById('saveAllBanner').classList.add('visible');
        }

        function markSaved() {
            hasUnsavedChanges = false;
            document.getElementById('saveAllBanner').classList.remove('visible');
        }

        function getImgSrc(imgStr) {
            if(!imgStr) return 'https://via.placeholder.com/70';
            if(imgStr.startsWith('data:image')) return imgStr;
            return `../${imgStr.replace('./', '')}`;
        }

        // --- دالة الاتصال المحسنة (بدون كاش لمعالجة الأخطاء والتعليق) ---
        async function ghApi(path, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json' },
                cache: 'no-store' // يمنع الكاش الذي يسبب المشكلة
            };
            if(body) options.body = JSON.stringify(body);
            
            // إضافة timestamp لإجبار جيت هب على جلب النسخة الأحدث
            const timestamp = new Date().getTime();
            const fetchUrl = method === 'GET' ? `https://api.github.com/repos/${REPO}/contents/${path}?t=${timestamp}` : `https://api.github.com/repos/${REPO}/contents/${path}`;

            const res = await fetch(fetchUrl, options);
            if (!res.ok) {
                let errText = "خطأ غير معروف";
                try {
                    const errObj = await res.json();
                    errText = errObj.message;
                } catch(e) { errText = await res.text(); }
                
                if (res.status === 401 || res.status === 404) {
                    alert("المفتاح السري غير صحيح أو لا يملك صلاحية (repo). يرجى التأكد منه!");
                    localStorage.removeItem('gh_pat'); location.reload();
                }
                throw new Error(errText);
            }
            return res.json();
        }

        async function loadData() {
            showLoader("جاري تحميل مطعمك...");
            try {
                const sData = await ghApi('settings.json');
                appSettings = JSON.parse(atou(sData.content));
                populateSettingsUI();

                const mData = await ghApi('menu.json');
                menuData = JSON.parse(atou(mData.content));
                renderCategories(); renderProducts();
            } catch (e) {
                alert("حدث خطأ أثناء جلب البيانات:\n" + e.message);
            }
            hideLoader();
        }

        function switchTab(tabId, title, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            element.classList.add('active');
            document.getElementById('headerTitle').innerText = title;
            window.scrollTo(0, 0);
        }

        function closeSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('sheetOverlay').classList.remove('active');
        }

        // ================= الإعدادات اللحظية =================
        function populateSettingsUI() {
            const ids = ['sName', 'sDesc', 'sWhatsApp', 'sMsg', 'sCurrency', 'sUiGreeting', 'sUiBack', 'sUiCartWord', 'sUiCartTitle', 'sUiAddBtn', 'sUiCheckoutBtn'];
            const keys = ['store_name', 'store_desc', 'whatsapp_number', 'whatsapp_template', 'currency', 'ui_greeting', 'ui_back', 'ui_cart_word', 'ui_cart_title', 'ui_add_btn', 'ui_checkout_btn'];
            
            for(let i=0; i<ids.length; i++){
                if(document.getElementById(ids[i])) document.getElementById(ids[i]).value = appSettings[keys[i]] || '';
            }
            if(appSettings.logo) {
                document.getElementById('sLogoPreview').src = getImgSrc(appSettings.logo);
                document.getElementById('sLogoPreview').style.display = 'inline-block';
            }
        }

        function updateSetting(key, value) {
            appSettings[key] = value;
            markUnsaved();
        }

        function previewSettingImage(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('sLogoPreview').src = e.target.result; 
                document.getElementById('sLogoPreview').style.display = 'inline-block';
                const base64 = e.target.result.split(',')[1];
                const ext = file.name.split('.').pop();
                tempUploads.settings = { base64, ext, fullData: e.target.result };
                appSettings.logo = e.target.result; // تحديث محلي للعرض
                markUnsaved();
            }
            reader.readAsDataURL(file);
        }

        // ================= الأقسام =================
        function previewImage(event, previewId) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById(previewId).src = e.target.result; 
                document.getElementById(previewId).style.display = 'inline-block';
                const base64 = e.target.result.split(',')[1];
                const ext = file.name.split('.').pop();
                
                if(previewId === 'pPreview') tempUploads.product = { base64, ext, fullData: e.target.result };
                else if (previewId === 'cPreview') tempUploads.category = { base64, ext, fullData: e.target.result };
            }
            reader.readAsDataURL(file);
        }

        function renderCategories() {
            const list = document.getElementById('categoriesList'); list.innerHTML = '';
            menuData.categories.forEach((cat, index) => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${getImgSrc(cat.image)}" onerror="this.src='https://via.placeholder.com/70'">
                        <div class="card-info">
                            <h3>${cat.name}</h3>
                            <span class="card-desc">${cat.items ? cat.items.length : 0} منتجات</span>
                        </div>
                        <div class="actions-group">
                            <div class="actions-row">
                                <button class="action-btn move" onclick="moveCategory(${index}, -1)" ${index===0?'disabled style="opacity:0.3"':''}>⬆️</button>
                                <button class="action-btn move" onclick="moveCategory(${index}, 1)" ${index===menuData.categories.length-1?'disabled style="opacity:0.3"':''}>⬇️</button>
                            </div>
                            <div class="actions-row">
                                <button class="action-btn edit" onclick="openCategorySheet('${cat.id}')">✏️</button>
                                <button class="action-btn delete" onclick="deleteCategory('${cat.id}')">🗑️</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function openCategorySheet(id = null) {
            editId = id; tempUploads.category = null;
            document.getElementById('cSheetTitle').innerText = id ? 'تعديل القسم' : 'إضافة قسم جديد';
            const nameInput = document.getElementById('cName');
            const imgPreview = document.getElementById('cPreview');

            if(id) {
                const cat = menuData.categories.find(c => c.id === id);
                nameInput.value = cat.name; currentImgPath = cat.image;
                imgPreview.src = getImgSrc(cat.image); imgPreview.style.display = 'inline-block';
            } else {
                nameInput.value = ''; currentImgPath = null; imgPreview.style.display = 'none';
            }
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('categorySheet').classList.add('active');
        }

        function applyCategoryChange() {
            const name = document.getElementById('cName').value;
            if(!name || (!tempUploads.category && !editId && !currentImgPath)) return alert("الاسم والصورة مطلوبان!");
            
            let imgPath = tempUploads.category ? tempUploads.category.fullData : currentImgPath;
            
            if(editId) {
                const cat = menuData.categories.find(c => c.id === editId);
                cat.name = name; cat.image = imgPath;
                if(tempUploads.category) { cat.tempBase64 = tempUploads.category.base64; cat.tempExt = tempUploads.category.ext; }
            } else {
                const newCat = { id: `c_${Date.now()}`, name, image: imgPath, items: [] };
                if(tempUploads.category) { newCat.tempBase64 = tempUploads.category.base64; newCat.tempExt = tempUploads.category.ext; }
                menuData.categories.push(newCat);
            }
            
            markUnsaved(); renderCategories(); renderProducts(); closeSheets();
        }

        function moveCategory(index, direction) {
            const temp = menuData.categories[index];
            menuData.categories[index] = menuData.categories[index + direction];
            menuData.categories[index + direction] = temp;
            markUnsaved(); renderCategories();
        }

        function deleteCategory(id) {
            if(!confirm("سيتم حذف القسم مع كل منتجاته! متأكد؟")) return;
            menuData.categories = menuData.categories.filter(c => c.id !== id);
            markUnsaved(); renderCategories(); renderProducts();
        }

        // ================= المنتجات =================
        function renderProducts() {
            const list = document.getElementById('productsList'); list.innerHTML = '';
            menuData.categories.forEach(cat => {
                if(!cat.items) cat.items = [];
                cat.items.forEach((item, index) => {
                    list.innerHTML += `
                        <div class="card">
                            <img src="${getImgSrc(item.image)}" onerror="this.src='https://via.placeholder.com/70'">
                            <div class="card-info">
                                <h3>${item.name}</h3>
                                <p>${item.price}</p>
                                <span class="card-desc">${cat.name} ${item.description ? '- '+item.description : ''}</span>
                            </div>
                            <div class="actions-group">
                                <div class="actions-row">
                                    <button class="action-btn move" onclick="moveProduct('${cat.id}', ${index}, -1)" ${index===0?'disabled style="opacity:0.3"':''}>⬆️</button>
                                    <button class="action-btn move" onclick="moveProduct('${cat.id}', ${index}, 1)" ${index===cat.items.length-1?'disabled style="opacity:0.3"':''}>⬇️</button>
                                </div>
                                <div class="actions-row">
                                    <button class="action-btn edit" onclick="openProductSheet('${cat.id}', '${item.id}')">✏️</button>
                                    <button class="action-btn delete" onclick="deleteItem('${cat.id}', '${item.id}')">🗑️</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function openProductSheet(catId = null, itemId = null) {
            editId = itemId; editOldCatId = catId; tempUploads.product = null;
            document.getElementById('pSheetTitle').innerText = itemId ? 'تعديل المنتج' : 'إضافة منتج جديد';
            
            const catSelect = document.getElementById('pCategory');
            catSelect.innerHTML = menuData.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            if(menuData.categories.length === 0) {
                alert("يرجى إضافة قسم أولاً قبل إضافة منتج!"); return;
            }

            const imgPreview = document.getElementById('pPreview');

            if(itemId) {
                const cat = menuData.categories.find(c => c.id === catId);
                const item = cat.items.find(i => i.id === itemId);
                document.getElementById('pName').value = item.name;
                document.getElementById('pDesc').value = item.description || '';
                document.getElementById('pPrice').value = item.price;
                catSelect.value = catId; currentImgPath = item.image;
                imgPreview.src = getImgSrc(item.image); imgPreview.style.display = 'inline-block';
            } else {
                document.getElementById('pName').value = ''; document.getElementById('pDesc').value = '';
                document.getElementById('pPrice').value = ''; currentImgPath = null; imgPreview.style.display = 'none';
            }
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('productSheet').classList.add('active');
        }

        function applyProductChange() {
            const name = document.getElementById('pName').value;
            const desc = document.getElementById('pDesc').value;
            const price = document.getElementById('pPrice').value;
            const newCatId = document.getElementById('pCategory').value;

            if(!name || !price || (!tempUploads.product && !editId && !currentImgPath)) return alert("الاسم، السعر والصورة مطلوبان!");
            
            let imgPath = tempUploads.product ? tempUploads.product.fullData : currentImgPath;
            
            let itemObj;
            if(editId) {
                if(editOldCatId !== newCatId) {
                    const oldCat = menuData.categories.find(c => c.id === editOldCatId);
                    itemObj = oldCat.items.find(i => i.id === editId);
                    oldCat.items = oldCat.items.filter(i => i.id !== editId);
                    menuData.categories.find(c => c.id === newCatId).items.push(itemObj);
                } else {
                    itemObj = menuData.categories.find(c => c.id === newCatId).items.find(i => i.id === editId);
                }
            } else {
                itemObj = { id: `i_${Date.now()}` };
                menuData.categories.find(c => c.id === newCatId).items.push(itemObj);
            }

            itemObj.name = name; itemObj.description = desc; itemObj.price = price; itemObj.image = imgPath;
            if(tempUploads.product) { itemObj.tempBase64 = tempUploads.product.base64; itemObj.tempExt = tempUploads.product.ext; }

            markUnsaved(); renderProducts(); renderCategories(); closeSheets();
        }

        function moveProduct(catId, index, direction) {
            const cat = menuData.categories.find(c => c.id === catId);
            const temp = cat.items[index];
            cat.items[index] = cat.items[index + direction];
            cat.items[index + direction] = temp;
            markUnsaved(); renderProducts();
        }

        function deleteItem(catId, itemId) {
            if(!confirm("متأكد من الحذف؟")) return;
            const cat = menuData.categories.find(c => c.id === catId);
            cat.items = cat.items.filter(i => i.id !== itemId);
            markUnsaved(); renderProducts(); renderCategories();
        }

        // ================= نظام الحفظ النهائي الشامل (Bulk Save) =================
        async function saveAllChanges() {
            showLoader("جاري مزامنة الإبداع مع الموقع... ⏳");
            try {
                // 1. رفع صورة اللوغو إن وجدت
                if (tempUploads.settings) {
                    const path = `images/logo_${Date.now()}.${tempUploads.settings.ext}`;
                    await ghApi(path, 'PUT', { message: 'Update Logo', content: tempUploads.settings.base64 });
                    appSettings.logo = `./${path}`;
                    tempUploads.settings = null;
                }

                // 2. رفع صور الأقسام والمنتجات
                for (let cat of menuData.categories) {
                    if (cat.tempBase64) {
                        const path = `images/cat_${Date.now()}_${Math.floor(Math.random()*1000)}.${cat.tempExt}`;
                        await ghApi(path, 'PUT', { message: 'Upload Category Image', content: cat.tempBase64 });
                        cat.image = `./${path}`; delete cat.tempBase64; delete cat.tempExt; delete cat.fullData;
                    }
                    if (cat.items) {
                        for (let item of cat.items) {
                            if (item.tempBase64) {
                                const path = `images/prod_${Date.now()}_${Math.floor(Math.random()*1000)}.${item.tempExt}`;
                                await ghApi(path, 'PUT', { message: 'Upload Product Image', content: item.tempBase64 });
                                item.image = `./${path}`; delete item.tempBase64; delete item.tempExt; delete item.fullData;
                            }
                        }
                    }
                }

                // 3. حفظ الإعدادات الشاملة (نجلب الـ SHA الجديد ثم نحفظ لنتجنب التعارض)
                const liveSettings = await ghApi('settings.json');
                const sContent = utoa(JSON.stringify(appSettings, null, 2));
                await ghApi('settings.json', 'PUT', { message: "Update Admin Settings", content: sContent, sha: liveSettings.sha });

                // 4. حفظ المنيو الشامل (نجلب الـ SHA الجديد ثم نحفظ لنتجنب التعارض)
                const liveMenu = await ghApi('menu.json');
                const mContent = utoa(JSON.stringify(menuData, null, 2));
                await ghApi('menu.json', 'PUT', { message: "Bulk Menu Update", content: mContent, sha: liveMenu.sha });
                
                markSaved();
                alert("تم رفع جميع التعديلات بنجاح! موقعك الآن محدث بالكامل 🎉");
            } catch (e) {
                console.error(e);
                alert("فشل الرفع للسيرفر ❌\nالسبب: " + e.message);
            }
            hideLoader();
        }
    </script>
</body>
</html>
